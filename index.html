<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Petromin AR - Pipeline Classic</title>
  
  <!-- Stable A-Frame & MindAR CDN pairing -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    /* Prevent rubber-banding or text selection highlighting on fast taps */
    * {
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #000;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    /* Loading Screen */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #D32F2F 0%, #FF6D00 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: white;
      transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      padding: 20px;
      text-align: center;
    }

    .spinner {
      width: 55px;
      height: 55px;
      border: 5px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      border-top-color: #FFFFFF;
      animation: spin 1s linear infinite;
      margin-bottom: 25px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Diagnostics On-Screen Console */
    #error-console {
      display: none;
      background: rgba(0, 0, 0, 0.9);
      color: #FF8A80;
      padding: 15px;
      border-radius: 12px;
      font-family: monospace;
      font-size: 11px;
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      z-index: 10000;
      word-break: break-all;
      border: 1px solid #FF5252;
    }

    /* Scanner Target Bounds HUD */
    #scan-guide {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 260px;
      height: 260px;
      border: 2px dashed rgba(255, 255, 255, 0.35);
      border-radius: 24px;
      pointer-events: none;
      z-index: 10;
    }

    #scan-guide::before, #scan-guide::after,
    #scan-guide span::before, #scan-guide span::after {
      content: "";
      position: absolute;
      width: 35px;
      height: 35px;
      border-color: #FFFFFF;
      border-style: solid;
    }
    #scan-guide::before { top: -3px; left: -3px; border-width: 5px 0 0 5px; border-top-left-radius: 18px; }
    #scan-guide::after { top: -3px; right: -3px; border-width: 5px 5px 0 0; border-top-right-radius: 18px; }
    #scan-guide span::before { bottom: -3px; left: -3px; border-width: 0 0 5px 5px; border-bottom-left-radius: 18px; }
    #scan-guide span::after { bottom: -3px; right: -3px; border-width: 0 5px 5px 0; border-bottom-right-radius: 18px; }

    #scan-text {
      position: absolute;
      width: 100%;
      text-align: center;
      color: #FFFFFF;
      bottom: -50px;
      font-size: 13px;
      font-weight: bold;
      text-shadow: 0 2px 5px rgba(0,0,0,0.9);
      letter-spacing: 1px;
    }

    /* Game Container Overlay */
    #game-container {
      position: fixed;
      bottom: -100%;
      left: 0;
      width: 100%;
      height: 85vh;
      background: #09090d;
      border-top-left-radius: 28px;
      border-top-right-radius: 28px;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.6);
      z-index: 100;
      transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-bottom: env(safe-area-inset-bottom);
    }

    #game-container.active {
      bottom: 0;
    }

    .card-handle {
      width: 36px;
      height: 5px;
      background: #2c2c35;
      border-radius: 10px;
      margin: 12px auto 8px;
      flex-shrink: 0;
    }

    /* Header Panel */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px 10px;
      color: #fff;
    }

    .game-header h2 {
      margin: 0;
      font-size: 18px;
      background: linear-gradient(90deg, #FF9100, #D32F2F);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .hud-metrics {
      display: flex;
      gap: 15px;
      font-family: monospace;
      font-size: 14px;
      align-items: center;
    }

    .metric-box {
      background: #151520;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid #2a2a3a;
    }

    #score-text {
      color: #00FFCC;
      text-shadow: 0 0 5px rgba(0, 255, 210, 0.3);
    }

    /* Canvas wrappers and UI menus */
    .canvas-wrapper {
      position: relative;
      flex-grow: 1;
      width: 100%;
      background: #050508;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #gameCanvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }

    /* Mobile Joystick Controller Container */
    #controls-container {
      width: 100%;
      height: 160px;
      background: #0c0c14;
      border-top: 1px solid #1a1a26;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      flex-shrink: 0;
    }

    /* Joystick Outer Ring Stylings */
    #joystick-boundary {
      width: 110px;
      height: 110px;
      background: radial-gradient(circle, #151524 0%, #0d0d16 100%);
      border: 3px solid #1c1c2e;
      border-radius: 50%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.6), 0 4px 15px rgba(0, 0, 0, 0.4);
      touch-action: none;
    }

    #joystick-boundary::before, #joystick-boundary::after {
      content: '';
      position: absolute;
      background: #2a2a3e;
      pointer-events: none;
    }
    #joystick-boundary::before {
      width: 80%;
      height: 2px;
      top: 50%;
      left: 10%;
      transform: translateY(-50%);
      background: linear-gradient(90deg, #33334d 0%, transparent 20%, transparent 80%, #33334d 100%);
    }
    #joystick-boundary::after {
      width: 2px;
      height: 80%;
      left: 50%;
      top: 10%;
      transform: translateX(-50%);
      background: linear-gradient(180deg, #33334d 0%, transparent 20%, transparent 80%, #33334d 100%);
    }

    /* Joystick Inner Thumb Stick */
    #joystick-stick {
      width: 46px;
      height: 46px;
      background: radial-gradient(circle, #ff7b00 0%, #e64a19 100%);
      border-radius: 50%;
      position: absolute;
      touch-action: none;
      box-shadow: 0 4px 10px rgba(230, 74, 25, 0.5), inset 0 2px 4px rgba(255, 255, 255, 0.4);
      will-change: transform;
      z-index: 2;
    }

    #joystick-stick:active {
      background: radial-gradient(circle, #ff9100 0%, #ff3d00 100%);
      box-shadow: 0 0 20px rgba(255, 61, 0, 0.8), inset 0 2px 4px rgba(255, 255, 255, 0.6);
    }

    .game-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(4, 4, 6, 0.94);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      z-index: 105;
      text-align: center;
      padding: 24px;
    }

    .game-overlay h3 {
      margin: 0;
      font-weight: 800;
      letter-spacing: 1.5px;
    }

    .game-overlay p {
      line-height: 1.6;
    }

    .game-overlay button {
      background: linear-gradient(90deg, #D32F2F, #FF6D00);
      color: white;
      border: none;
      padding: 14px 35px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: transform 0.1s ease;
    }

    .game-overlay button:active {
      transform: scale(0.95);
    }

    .legend-box {
      display: flex;
      gap: 15px;
      margin: 15px 0;
      background: rgba(255,255,255,0.04);
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 11px;
      text-align: left;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>

  <!-- Loading Animation Overlay -->
  <div id="loading">
    <div class="spinner"></div>
    <h3 style="margin:0; letter-spacing: 1px;">PETROMIN AR</h3>
    <p style="font-size:12px; opacity:0.8; margin-top:5px; font-weight: 500;">Accessing Camera Feed...</p>
  </div>

  <!-- On-Screen Console for Diagnostics -->
  <div id="error-console"></div>

  <!-- HUD Overlay -->
  <div id="scan-guide">
    <span></span>
    <div id="scan-text">ALIGN WITH PETROMIN LOGO</div>
  </div>

  <!-- Interactive 2D Game Drawer -->
  <div id="game-container">
    <div class="card-handle"></div>
    <div class="game-header">
      <h2>PETRO-PIPELINE</h2>
      <div class="hud-metrics">
        <div class="metric-box" id="score-text">FLOW: 0 L</div>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>
      
      <!-- Interactive Joystick Controls -->
      <div id="controls-container">
        <div id="joystick-boundary">
          <div id="joystick-stick"></div>
        </div>
      </div>

      <!-- Start Overlay -->
      <div id="start-overlay" class="game-overlay">
        <h3 style="font-size: 26px; color: #FF6D00; margin-bottom: 5px;">PETROMIN PIPELINE</h3>
        <p style="font-size: 12px; color: #aaa; margin: 0 0 10px;">Connect pipeline segments using the joystick below.</p>
        
        <div class="legend-box">
          <div class="legend-item">
            <span style="display:inline-block; width:12px; height:12px; background:#FF9100; border-radius:50%; box-shadow: 0 0 6px #FF9100;"></span>
            <span>Oil Drop (+10 Liters)</span>
          </div>
          <div class="legend-item">
            <span style="display:inline-block; width:12px; height:12px; background:#00FFCC; border-radius:50%; box-shadow: 0 0 6px #00FFCC;"></span>
            <span>Premium Fuel (Speed up)</span>
          </div>
        </div>

        <button onclick="startGame()">START FLOW</button>
      </div>

      <!-- Game Over Overlay -->
      <div id="gameover-overlay" class="game-overlay" style="display: none;">
        <h3 style="font-size: 28px; color: #D32F2F;">PIPELINE LEAK!</h3>
        <p id="final-score-text" style="font-size: 16px; margin: 8px 0; color: #00FFCC;">Total Flow: 0 Liters</p>
        <p id="game-over-reason" style="font-size: 12px; color: #aaa; max-width: 250px; margin-bottom: 10px;"></p>
        <button onclick="startGame()">REPAIR & RETRY</button>
      </div>
    </div>
  </div>

  <!-- AR Scene -->
  <a-scene 
    id="ar-scene"
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Index 0 corresponds to the compiled logo marker inside targets.mind -->
    <a-entity id="ar-target" mindar-image-target="targetIndex: 0"></a-entity>
  </scene>

  <script>
    const loadingScreen = document.getElementById('loading');
    const scanGuide = document.getElementById('scan-guide');
    const gameContainer = document.getElementById('game-container');
    const targetEntity = document.getElementById('ar-target');
    const sceneEl = document.getElementById('ar-scene');
    const errConsole = document.getElementById('error-console');

    // Display error stack if file compilation fails
    function showRuntimeError(message) {
      errConsole.style.display = 'block';
      errConsole.innerHTML += '<strong>[System Check]:</strong> ' + message + '<br>';
    }

    // Capture global failures
    window.onerror = function(msg, url, line) {
      showRuntimeError(`${msg} (line ${line})`);
      return false;
    };

    // Build target descriptors database link
    function buildTargetUrl() {
      const path = window.location.pathname;
      const segments = path.split('/').filter(s => s !== "");
      if (segments.length > 0 && !path.endsWith('.html')) {
        return `/${segments[0]}/targets.mind`;
      }
      return 'targets.mind';
    }

    const targetUrl = buildTargetUrl();
    sceneEl.setAttribute('mindar-image', `imageTargetSrc: ${targetUrl}; filterMinCF:0.001; filterBeta: 10`);

    // Complete loading stage
    sceneEl.addEventListener("arReady", () => {
      loadingScreen.style.opacity = '0';
      setTimeout(() => {
        loadingScreen.style.display = 'none';
      }, 400);
    });

    sceneEl.addEventListener("arError", () => {
      showRuntimeError(`Engine could not download target descriptor database at: ${window.location.origin}${targetUrl}`);
    });

    // Handle AR Recognition Match
    targetEntity.addEventListener("targetFound", () => {
      gameContainer.classList.add('active');
      scanGuide.style.display = 'none';
      setTimeout(initCanvas, 400); // Wait for transition animation to end
    });

    // ==========================================================
    //       PETROMIN PIPELINE (CLASSIC RETRO SNAKE RESKIN)
    // ==========================================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startOverlay = document.getElementById('start-overlay');
    const gameoverOverlay = document.getElementById('gameover-overlay');
    const scoreText = document.getElementById('score-text');
    const finalScoreText = document.getElementById('final-score-text');
    const gameOverReason = document.getElementById('game-over-reason');

    // Grid details
    const gridSize = 20; // 20x20 Grid
    let tileCountX = 0;
    let tileCountY = 0;
    let gridCellWidth = 0;
    let gridCellHeight = 0;

    let pipeline = [];
    let dx = 1; // current X velocity
    let dy = 0; // current Y velocity
    
    // Buffer next direct movements to prevent illegal self-reversing inputs
    let inputQueue = [];

    let oilDrop = { x: 0, y: 0, special: false };
    let score = 0;
    let gameActive = false;
    let gameInterval = null;
    let baseSpeed = 140; // update frequency in ms
    let currentSpeed = baseSpeed;

    function initCanvas() {
      const wrapper = canvas.parentElement;
      const rect = wrapper.getBoundingClientRect();
      const margin = 16;
      const size = Math.min(rect.width - margin, rect.height - margin);
      
      canvas.width = size;
      canvas.height = size;

      tileCountX = gridSize;
      tileCountY = gridSize;
      gridCellWidth = size / tileCountX;
      gridCellHeight = size / tileCountY;

      if (gameActive) {
        drawGame();
      }
    }

    // Dynamic resize listener to handle transitions, rotations, and folding screens
    window.addEventListener('resize', () => {
      if (gameContainer.classList.contains('active')) {
        requestAnimationFrame(initCanvas);
      }
    });

    // Highly responsive queued direction setting
    function setDirection(newDx, newDy) {
      if (!gameActive) return;
      
      // Get the last requested movement direction (or fallback to active state)
      const lastMove = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : { dx: dx, dy: dy };

      // Prevent opposite action inputs entirely
      if ((newDx === -1 && lastMove.dx === 1) || (newDx === 1 && lastMove.dx === -1)) return;
      if ((newDy === -1 && lastMove.dy === 1) || (newDy === 1 && lastMove.dy === -1)) return;

      // Limit buffer depth to keep controls feeling accurate and predictable
      if (inputQueue.length < 2) {
        inputQueue.push({ dx: newDx, dy: newDy });
      }
    }

    // ==========================================================
    //            DYNAMIC VIRTUAL JOYSTICK PHYSICS
    // ==========================================================
    const joystickBoundary = document.getElementById('joystick-boundary');
    const joystickStick = document.getElementById('joystick-stick');
    
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    const maxDistance = 40; // Clamped radius boundary
    const deadzone = 12; // Minimum movement required before registers input

    function handleStart(clientX, clientY) {
      isDragging = true;
      const rect = joystickBoundary.getBoundingClientRect();
      dragStartX = rect.left + rect.width / 2;
      dragStartY = rect.top + rect.height / 2;
      
      // Clear visual delay scaling
      joystickStick.style.transition = 'none';
    }

    function handleMove(clientX, clientY) {
      if (!isDragging) return;

      const deltaX = clientX - dragStartX;
      const deltaY = clientY - dragStartY;
      const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

      let targetX = deltaX;
      let targetY = deltaY;

      if (distance > maxDistance) {
        targetX = (deltaX / distance) * maxDistance;
        targetY = (deltaY / distance) * maxDistance;
      }

      // Hardware accelerated position updates
      joystickStick.style.transform = `translate3d(${targetX}px, ${targetY}px, 0)`;

      if (distance > deadzone) {
        if (Math.abs(targetX) > Math.abs(targetY)) {
          setDirection(targetX > 0 ? 1 : -1, 0);
        } else {
          setDirection(0, targetY > 0 ? 1 : -1);
        }
      }
    }

    function handleEnd() {
      if (!isDragging) return;
      isDragging = false;
      // Smooth visual spring return
      joystickStick.style.transition = 'transform 0.15s cubic-bezier(0.25, 1, 0.5, 1)';
      joystickStick.style.transform = 'translate3d(0px, 0px, 0)';
    }

    // Highly Responsive Mobile Touch Triggers (bypass 300ms tap lags completely)
    joystickBoundary.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleStart(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    window.addEventListener('touchmove', (e) => {
      if (isDragging) {
        handleMove(e.touches[0].clientX, e.touches[0].clientY);
      }
    }, { passive: true });

    window.addEventListener('touchend', handleEnd, { passive: true });

    // Desktop mouse behaviors
    joystickBoundary.addEventListener('mousedown', (e) => {
      handleStart(e.clientX, e.clientY);
    });

    window.addEventListener('mousemove', (e) => {
      if (isDragging) {
        handleMove(e.clientX, e.clientY);
      }
    });

    window.addEventListener('mouseup', handleEnd);

    // Support Keyboard arrows for desktop testing
    window.addEventListener('keydown', (e) => {
      switch(e.key) {
        case 'ArrowUp': case 'w': case 'W': setDirection(0, -1); break;
        case 'ArrowDown': case 's': case 'S': setDirection(0, 1); break;
        case 'ArrowLeft': case 'a': case 'A': setDirection(-1, 0); break;
        case 'ArrowRight': case 'd': case 'D': setDirection(1, 0); break;
      }
    });

    function spawnOilDrop() {
      let valid = false;
      let rx, ry;
      while(!valid) {
        rx = Math.floor(Math.random() * tileCountX);
        ry = Math.floor(Math.random() * tileCountY);
        valid = !pipeline.some(segment => segment.x === rx && segment.y === ry);
      }
      oilDrop.x = rx;
      oilDrop.y = ry;
      oilDrop.special = Math.random() < 0.25; // 25% chance of premium high speed value drop
    }

    function startGame() {
      startOverlay.style.display = 'none';
      gameoverOverlay.style.display = 'none';
      initCanvas();

      score = 0;
      dx = 1;
      dy = 0;
      inputQueue = [];
      currentSpeed = baseSpeed;

      // Start in middle, length of 3 segments
      pipeline = [
        { x: 5, y: 10 },
        { x: 4, y: 10 },
        { x: 3, y: 10 }
      ];

      spawnOilDrop();
      gameActive = true;
      scoreText.innerText = `FLOW: 0 L`;

      if (gameInterval) clearTimeout(gameInterval);
      runLoop();
    }

    function runLoop() {
      if (!gameActive) return;
      gameInterval = setTimeout(() => {
        updateGame();
        drawGame();
        runLoop();
      }, currentSpeed);
    }

    function updateGame() {
      // Dequeue next action direction instantly on cycle
      if (inputQueue.length > 0) {
        const nextMove = inputQueue.shift();
        dx = nextMove.dx;
        dy = nextMove.dy;
      }

      // Calculate new raw head position
      let nextX = pipeline[0].x + dx;
      let nextY = pipeline[0].y + dy;

      // Wrap-Around Screen Collision logic
      if (nextX < 0) {
        nextX = tileCountX - 1;
      } else if (nextX >= tileCountX) {
        nextX = 0;
      }

      if (nextY < 0) {
        nextY = tileCountY - 1;
      } else if (nextY >= tileCountY) {
        nextY = 0;
      }

      const head = { x: nextX, y: nextY };

      // Self-Collision Check
      if (pipeline.some(segment => segment.x === head.x && segment.y === head.y)) {
        triggerLeak("Pipeline pressure overloaded by self-intersection!");
        return;
      }

      // Prepend new head
      pipeline.unshift(head);

      // Check if food eaten
      if (head.x === oilDrop.x && head.y === oilDrop.y) {
        if (oilDrop.special) {
          score += 25;
          currentSpeed = Math.max(50, currentSpeed - 12); // Dynamic speed step scaling
        } else {
          score += 10;
          currentSpeed = Math.max(50, currentSpeed - 4);
        }
        scoreText.innerText = `FLOW: ${score} L`;
        spawnOilDrop();
      } else {
        pipeline.pop();
      }
    }

    function triggerLeak(reason) {
      gameActive = false;
      clearTimeout(gameInterval);
      finalScoreText.innerText = `Total Flow: ${score} Liters`;
      gameOverReason.innerText = reason;
      gameoverOverlay.style.display = 'flex';
    }

    function drawGame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw Grid Background
      ctx.fillStyle = '#050508';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= tileCountX; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridCellWidth, 0);
        ctx.lineTo(i * gridCellWidth, canvas.height);
        ctx.stroke();
      }
      for (let j = 0; j <= tileCountY; j++) {
        ctx.beginPath();
        ctx.moveTo(0, j * gridCellHeight);
        ctx.lineTo(canvas.width, j * gridCellHeight);
        ctx.stroke();
      }

      // Draw Oil Target Food
      ctx.save();
      const fx = oilDrop.x * gridCellWidth + gridCellWidth / 2;
      const fy = oilDrop.y * gridCellHeight + gridCellHeight / 2;
      const fRadius = (gridCellWidth / 2) - 2;

      ctx.shadowBlur = 10;
      if (oilDrop.special) {
        ctx.fillStyle = '#00FFCC';
        ctx.shadowColor = '#00FFCC';
      } else {
        ctx.fillStyle = '#FF9100';
        ctx.shadowColor = '#FF9100';
      }

      ctx.beginPath();
      ctx.moveTo(fx, fy - fRadius);
      ctx.bezierCurveTo(fx + fRadius, fy, fx + fRadius, fy + fRadius, fx, fy + fRadius);
      ctx.bezierCurveTo(fx - fRadius, fy + fRadius, fx - fRadius, fy, fx, fy - fRadius);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      // Draw Pipeline Body
      pipeline.forEach((segment, index) => {
        ctx.save();
        const sx = segment.x * gridCellWidth;
        const sy = segment.y * gridCellHeight;
        const innerOffset = 2;

        if (index === 0) {
          // Lead segment head
          ctx.fillStyle = '#D32F2F';
          ctx.shadowBlur = 12;
          ctx.shadowColor = '#D32F2F';
          ctx.beginPath();
          ctx.roundRect(sx + innerOffset, sy + innerOffset, gridCellWidth - innerOffset*2, gridCellHeight - innerOffset*2, 6);
          ctx.fill();

          // Add head sensors (eyes)
          ctx.fillStyle = '#FFFFFF';
          ctx.beginPath();
          if (dx === 1) { // moving right
            ctx.arc(sx + gridCellWidth - 6, sy + 6, 2.5, 0, Math.PI*2);
            ctx.arc(sx + gridCellWidth - 6, sy + gridCellHeight - 6, 2.5, 0, Math.PI*2);
          } else if (dx === -1) { // moving left
            ctx.arc(sx + 6, sy + 6, 2.5, 0, Math.PI*2);
            ctx.arc(sx + 6, sy + gridCellHeight - 6, 2.5, 0, Math.PI*2);
          } else if (dy === 1) { // moving down
            ctx.arc(sx + 6, sy + gridCellHeight - 6, 2.5, 0, Math.PI*2);
            ctx.arc(sx + gridCellWidth - 6, sy + gridCellHeight - 6, 2.5, 0, Math.PI*2);
          } else { // moving up
            ctx.arc(sx + 6, sy + 6, 2.5, 0, Math.PI*2);
            ctx.arc(sx + gridCellWidth - 6, sy + 6, 2.5, 0, Math.PI*2);
          }
          ctx.fill();
        } else {
          // Standard golden pipeline body segment
          ctx.fillStyle = '#FF6D00';
          ctx.shadowBlur = 6;
          ctx.shadowColor = '#FF6D00';
          ctx.beginPath();
          ctx.roundRect(sx + innerOffset, sy + innerOffset, gridCellWidth - innerOffset*2, gridCellHeight - innerOffset*2, 4);
          ctx.fill();
        }
        ctx.restore();
      });
    }
  </script>
</body>
