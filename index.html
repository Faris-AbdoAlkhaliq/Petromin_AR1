<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Petromin AR Scanner</title>
  
  <!-- Stable A-Frame & MindAR CDN pairing -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #000;
      -webkit-tap-highlight-color: transparent;
    }

    /* Loading Screen using Petromin's corporate color palette */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #D32F2F 0%, #FF6D00 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: white;
      transition: opacity 0.5s ease;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }

    .spinner {
      width: 55px;
      height: 55px;
      border: 5px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      border-top-color: #FFFFFF;
      animation: spin 1s linear infinite;
      margin-bottom: 25px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Diagnostics On-Screen Console */
    #error-console {
      display: none;
      background: rgba(0, 0, 0, 0.9);
      color: #FF8A80;
      padding: 15px;
      border-radius: 12px;
      font-family: monospace;
      font-size: 11px;
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      z-index: 10000;
      word-break: break-all;
      border: 1px solid #FF5252;
    }

    /* Scanner Target Bounds HUD */
    #scan-guide {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 260px;
      height: 260px;
      border: 2px dashed rgba(255, 255, 255, 0.35);
      border-radius: 24px;
      pointer-events: none;
      z-index: 10;
    }

    #scan-guide::before, #scan-guide::after,
    #scan-guide span::before, #scan-guide span::after {
      content: "";
      position: absolute;
      width: 35px;
      height: 35px;
      border-color: #FFFFFF;
      border-style: solid;
    }
    /* Corner HUD Borders */
    #scan-guide::before { top: -3px; left: -3px; border-width: 5px 0 0 5px; border-top-left-radius: 18px; }
    #scan-guide::after { top: -3px; right: -3px; border-width: 5px 5px 0 0; border-top-right-radius: 18px; }
    #scan-guide span::before { bottom: -3px; left: -3px; border-width: 0 0 5px 5px; border-bottom-left-radius: 18px; }
    #scan-guide span::after { bottom: -3px; right: -3px; border-width: 0 5px 5px 0; border-bottom-right-radius: 18px; }

    #scan-text {
      position: absolute;
      width: 100%;
      text-align: center;
      color: #FFFFFF;
      bottom: -50px;
      font-size: 13px;
      font-weight: bold;
      text-shadow: 0 2px 5px rgba(0,0,0,0.9);
      letter-spacing: 1px;
    }

    /* 2D HUD instruction element overlay */
    #hud-interaction-tip {
      display: none;
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      color: #FFF;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: bold;
      z-index: 50;
      border: 1.5px solid #FF6D00;
      pointer-events: none;
      letter-spacing: 0.5px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
  </style>

  <script>
    // Click handling component for spatial UI buttons
    AFRAME.registerComponent('ar-button-handler', {
      init: function () {
        const el = this.el;
        
        el.addEventListener('mouseenter', () => {
          el.setAttribute('material', 'color', '#FF6D00');
        });

        el.addEventListener('mouseleave', () => {
          el.setAttribute('material', 'color', '#D32F2F');
        });

        el.addEventListener('click', () => {
          // Visual click feedback
          el.setAttribute('scale', '0.9 0.9 1');
          setTimeout(() => el.setAttribute('scale', '1 1 1'), 150);

          // Custom business logic based on element ID
          if (el.id === 'btn-close') {
            const card = document.querySelector('#info-3d-card');
            card.setAttribute('animation__hide', {
              property: 'scale',
              to: '0 0 0',
              dur: 400,
              easing: 'easeInBack'
            });
            document.querySelector('#hud-interaction-tip').innerText = "TAP CARD CORNER GLOW TO RE-OPEN";
          } else if (el.id === 'info-3d-card' || el.id === 'neon-glow-ring') {
            // Re-open if they tap the closed ring card base
            const card = document.querySelector('#info-3d-card');
            if (card.getAttribute('scale').x === 0) {
              card.setAttribute('animation__show', {
                property: 'scale',
                to: '1 1 1',
                dur: 500,
                easing: 'easeOutBack'
              });
              document.querySelector('#hud-interaction-tip').innerText = "USE CENTER RETICLE TO TAP BUTTONS";
            }
          }
        });
      }
    });
  </script>
</head>
<body>

  <!-- Loading Animation Overlay -->
  <div id="loading">
    <div class="spinner"></div>
    <h3 style="margin:0; letter-spacing: 1px;">PETROMIN AR</h3>
    <p style="font-size:12px; opacity:0.8; margin-top:5px; font-weight: 500;">Accessing Camera Feed...</p>
  </div>

  <!-- On-Screen Console for Diagnostics -->
  <div id="error-console"></div>

  <!-- HUD Overlay -->
  <div id="scan-guide">
    <span></span>
    <div id="scan-text">ALIGN WITH PETROMIN LOGO</div>
  </div>

  <!-- Camera Reticle Guide HUD -->
  <div id="hud-interaction-tip">
    USE CENTER RETICLE TO TAP BUTTONS
  </div>

  <!-- AR Scene -->
  <a-scene 
    id="ar-scene"
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false"
    raycaster="objects: .clickable">
    
    <!-- AR Camera featuring a dynamic targeting system for clicking 3D UI on mobile screens -->
    <a-camera position="0 0 0" look-controls="enabled: false">
      <a-cursor 
        id="cursor"
        raycaster="objects: .clickable"
        material="color: #FFFFFF; shader: flat; opacity: 0.8"
        position="0 0 -1"
        geometry="primitive: ring; radiusInner: 0.009; radiusOuter: 0.015">
      </a-cursor>
    </a-camera>

    <!-- Index 0 corresponds to the compiled logo marker inside targets.mind -->
    <a-entity id="ar-target" mindar-image-target="targetIndex: 0">

      <!-- Interactive 3D Spatial Information Panel -->
      <a-entity 
        id="info-3d-card" 
        class="clickable"
        position="0 0 0.1" 
        scale="0 0 0"
        ar-button-handler>
        
        <!-- UI Backplane (Modern Matte Obsidian Finish) -->
        <a-plane 
          width="1.0" 
          height="1.3" 
          material="color: #121212; opacity: 0.96; transparent: true; roughness: 0.6; metalness: 0.2" 
          geometry="primitive: plane">
          
          <!-- Outer Neon Orange Boundary Accent Frame -->
          <a-ring id="neon-glow-ring" class="clickable" color="#FF6D00" radius-inner="0.67" radius-outer="0.68" scale="1.02 1.02 1" position="0 0 0.002" ar-button-handler></a-ring>

          <!-- HEADER PANEL -->
          <!-- Small Red Tag Design Component -->
          <a-plane width="0.3" height="0.05" position="-0.32 0.52 0.01" material="color: #D32F2F; shader: flat"></a-plane>
          
          <a-text 
            value="PETROMIN CORPORATION" 
            color="#FFFFFF" 
            align="left" 
            width="0.9" 
            position="-0.45 0.45 0.01" 
            font="aileron"
            wrap-count="20">
          </a-text>

          <a-text 
            value="An Al-Dabbagh Group Company" 
            color="#FF6D00" 
            align="left" 
            width="0.7" 
            position="-0.45 0.38 0.01" 
            font="aileron">
          </a-text>

          <!-- HORIZONTAL RULE DECORATIVE DIVIDER -->
          <a-plane width="0.9" height="0.005" position="0 0.32 0.01" material="color: #444; shader: flat"></a-plane>

          <!-- STATS DISPLAY (3 Wide Grid Layout) -->
          <!-- Stat 1 -->
          <a-plane width="0.26" height="0.16" position="-0.30 0.18 0.01" material="color: #1A1A1A">
            <a-text value="1968" color="#D32F2F" align="center" width="0.7" position="0 0.03 0.005" font="aileron" bold="true"></a-text>
            <a-text value="FOUNDED" color="#999" align="center" width="0.4" position="0 -0.04 0.005" font="dejavu"></a-text>
          </a-plane>

          <!-- Stat 2 -->
          <a-plane width="0.26" height="0.16" position="0 0.18 0.01" material="color: #1A1A1A">
            <a-text value="6,000+" color="#D32F2F" align="center" width="0.7" position="0 0.03 0.005" font="aileron" bold="true"></a-text>
            <a-text value="TEAM SIZE" color="#999" align="center" width="0.4" position="0 -0.04 0.005" font="dejavu"></a-text>
          </a-plane>

          <!-- Stat 3 -->
          <a-plane width="0.26" height="0.16" position="0.30 0.18 0.01" material="color: #1A1A1A">
            <a-text value="40+" color="#D32F2F" align="center" width="0.7" position="0 0.03 0.005" font="aileron" bold="true"></a-text>
            <a-text value="MARKETS" color="#999" align="center" width="0.4" position="0 -0.04 0.005" font="dejavu"></a-text>
          </a-plane>

          <!-- OVERVIEW SECTION -->
          <a-text 
            value="CORPORATE OVERVIEW" 
            color="#FF6D00" 
            align="left" 
            width="0.55" 
            position="-0.45 0.04 0.01" 
            font="aileron"
            bold="true">
          </a-text>

          <a-text 
            value="Originally established by Royal Decree as a lubricating oil company, Petromin has evolved into the leading ultra-modern multi-brand automotive services and mobility solutions platform in Saudi Arabia." 
            color="#CCCCCC" 
            align="left" 
            width="0.88" 
            position="-0.45 -0.10 0.01" 
            line-height="46"
            font="dejavu"
            wrap-count="40">
          </a-text>

          <!-- PILLARS SECTION -->
          <a-text 
            value="KEY ENTERPRISE PILLARS" 
            color="#FF6D00" 
            align="left" 
            width="0.55" 
            position="-0.45 -0.25 0.01" 
            font="aileron"
            bold="true">
          </a-text>

          <!-- Double Column Pill Layout lists -->
          <a-text 
            value="* Petrolube (Lubricants)\n* Petromin Express\n* Auto Care (Repairs)\n* Fuel Retail Stations" 
            color="#E0E0E0" 
            align="left" 
            width="0.45" 
            position="-0.45 -0.41 0.01" 
            line-height="50"
            font="dejavu">
          </a-text>

          <a-text 
            value="* National Fleet (NFC)\n* Electromin (EV System)\n* Auto Dealerships\n* Spare Parts Dist." 
            color="#E0E0E0" 
            align="left" 
            width="0.45" 
            position="0.05 -0.41 0.01" 
            line-height="50"
            font="dejavu">
          </a-text>

          <!-- ACTION BUTTON (Classic Petromin Corporate Red Pill Button) -->
          <a-plane 
            id="btn-close" 
            class="clickable" 
            width="0.5" 
            height="0.11" 
            position="0 -0.52 0.02" 
            material="color: #D32F2F; shader: flat"
            ar-button-handler>
            <a-text value="CLOSE PRESENTATION" color="#FFFFFF" align="center" width="0.75" position="0 0 0.01" font="aileron" bold="true"></a-text>
          </a-plane>

        </a-plane>
      </a-entity>

    </a-entity>
  </scene>

  <script>
    const loadingScreen = document.getElementById('loading');
    const scanGuide = document.getElementById('scan-guide');
    const targetEntity = document.getElementById('ar-target');
    const sceneEl = document.getElementById('ar-scene');
    const errConsole = document.getElementById('error-console');
    const info3DCard = document.getElementById('info-3d-card');
    const interactionTip = document.getElementById('hud-interaction-tip');

    // Display error stack if file compilation fails
    function showRuntimeError(message) {
      errConsole.style.display = 'block';
      errConsole.innerHTML += '<strong>[System Check]:</strong> ' + message + '<br>';
    }

    // Capture global page failures
    window.onerror = function(msg, url, line) {
      showRuntimeError(`${msg} (line ${line})`);
      return false;
    };

    // Auto-detect if host path is root or subfolder (GitHub Pages Repo setup)
    function buildTargetUrl() {
      const path = window.location.pathname;
      const segments = path.split('/').filter(s => s !== "");
      
      // If deployed in a GitHub sub-repository
      if (segments.length > 0 && !path.endsWith('.html')) {
        return `/${segments[0]}/targets.mind`;
      }
      return 'targets.mind';
    }

    const targetUrl = buildTargetUrl();
    sceneEl.setAttribute('mindar-image', `imageTargetSrc: ${targetUrl}; filterMinCF:0.001; filterBeta: 10`);

    // Complete loading stage once engine is online
    sceneEl.addEventListener("arReady", () => {
      loadingScreen.style.opacity = '0';
      setTimeout(() => {
        loadingScreen.style.display = 'none';
      }, 500);
    });

    // Detect missing file or assets
    sceneEl.addEventListener("arError", () => {
      showRuntimeError(`Engine could not download target descriptor database at: ${window.location.origin}${targetUrl}`);
    });

    // Image target detection triggers information panel inside AR Space
    targetEntity.addEventListener("targetFound", () => {
      scanGuide.style.display = 'none';
      interactionTip.style.display = 'block';
      
      // Animate card entry scaling up inside space
      info3DCard.setAttribute('animation__show', {
        property: 'scale',
        to: '1 1 1',
        dur: 600,
        easing: 'easeOutBack'
      });
    });

    // Reset scanner viewport when the marker tracking gets lost
    targetEntity.addEventListener("targetLost", () => {
      scanGuide.style.display = 'block';
      interactionTip.style.display = 'none';
      
      // Reset scale state out of camera line of sight
      info3DCard.setAttribute('scale', '0 0 0');
    });
  </script>
</body>
</html>
