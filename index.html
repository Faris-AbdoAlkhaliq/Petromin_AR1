<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Petromin Interactive AR Experience</title>
  
  <!-- Stable A-Frame & MindAR CDN pairing -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #000;
      -webkit-tap-highlight-color: transparent;
    }

    /* Loading Screen - Classic Petromin Orange/Red Gradient */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #D32F2F 0%, #FF6D00 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: white;
      transition: opacity 0.5s ease;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      border-top-color: #FFFFFF;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Interactive HUD Instruction overlay */
    #hud-instruction {
      display: none;
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: #FFF;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: bold;
      z-index: 50;
      border: 1px solid #FF6D00;
      pointer-events: none;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      text-align: center;
    }

    /* Scanner Guideline HUD */
    #scan-guide {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 260px;
      height: 260px;
      border: 2px dashed rgba(255, 255, 255, 0.35);
      border-radius: 24px;
      pointer-events: none;
      z-index: 10;
    }

    #scan-guide::before, #scan-guide::after,
    #scan-guide span::before, #scan-guide span::after {
      content: "";
      position: absolute;
      width: 30px;
      height: 30px;
      border-color: #FFFFFF;
      border-style: solid;
    }
    #scan-guide::before { top: -3px; left: -3px; border-width: 4px 0 0 4px; border-top-left-radius: 18px; }
    #scan-guide::after { top: -3px; right: -3px; border-width: 4px 4px 0 0; border-top-right-radius: 18px; }
    #scan-guide span::before { bottom: -3px; left: -3px; border-width: 0 0 4px 4px; border-bottom-left-radius: 18px; }
    #scan-guide span::after { bottom: -3px; right: -3px; border-width: 0 4px 4px 0; border-bottom-right-radius: 18px; }

    #scan-text {
      position: absolute;
      width: 100%;
      text-align: center;
      color: #FFFFFF;
      bottom: -45px;
      font-size: 12px;
      font-weight: bold;
      text-shadow: 0 2px 5px rgba(0,0,0,0.9);
    }
  </style>

  <script>
    // Custom logic component to handle 3D-on-3D interaction mechanics
    AFRAME.registerComponent('ar-interact', {
      init: function () {
        const carModel = document.querySelector('#nissan-car');
        const infoPlane = document.querySelector('#info-3d-plane');
        const hudText = document.querySelector('#hud-text');
        
        // When clicking the Car: show/animate the 3D Info Plane
        carModel.addEventListener('click', () => {
          playEngineSound();
          
          // Animate 3D plane scaling up
          infoPlane.setAttribute('animation__show', {
            property: 'scale',
            to: '1 1 1',
            dur: 500,
            easing: 'easeOutBack'
          });
          
          hudText.innerText = "TAP 3D CARD TO CLOSE IT";
        });

        // When clicking the 3D Info Plane: scale it back down
        infoPlane.addEventListener('click', () => {
          infoPlane.setAttribute('animation__hide', {
            property: 'scale',
            to: '0 0 0',
            dur: 400,
            easing: 'easeInBack'
          });
          
          hudText.innerText = "TAP CAR TO INSPECT";
        });
      }
    });

    // Clean synthetic audio engine output
    function playEngineSound() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(55, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(160, ctx.currentTime + 0.3);
        osc.frequency.exponentialRampToValueAtTime(90, ctx.currentTime + 0.8);
        
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(280, ctx.currentTime);
        
        osc.connect(gain);
        gain.connect(filter);
        filter.connect(ctx.destination);
        
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.8);
        
        osc.start();
        osc.stop(ctx.currentTime + 0.8);
      } catch (e) {
        console.warn("Web Audio context waiting for gesture to play sound.");
      }
    }
  </script>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading">
    <div class="spinner"></div>
    <h3 style="margin:0; letter-spacing: 1px;">PETROMIN CORPORATION</h3>
    <p style="font-size:11px; opacity:0.8; margin-top:5px;">Initializing 3D Space...</p>
  </div>

  <!-- Interactive Instruction HUD Header -->
  <div id="hud-instruction">
    <span id="hud-text">TAP CAR TO INSPECT</span>
  </div>

  <!-- Scanning Guide HUD Frame -->
  <div id="scan-guide">
    <span></span>
    <div id="scan-text">ALIGN WITH PETROMIN LOGO</div>
  </div>

  <!-- AR Scene -->
  <a-scene 
    id="ar-scene"
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false"
    raycaster="objects: .clickable"
    ar-interact>
    
    <!-- Preloading Assets -->
    <a-assets>
      <a-asset-item id="nissanModel" src="nissan_car.glb"></a-asset-item>
    </a-assets>

    <!-- Camera configuration with active cursor raycasting -->
    <a-camera position="0 0 0" look-controls="enabled: false">
      <a-cursor 
        id="cursor"
        raycaster="objects: .clickable"
        material="color: #FFFFFF; shader: flat; opacity: 0.7"
        position="0 0 -1"
        geometry="primitive: ring; radiusInner: 0.007; radiusOuter: 0.013">
      </a-cursor>
    </a-camera>

    <!-- AR Target Entity -->
    <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
      
      <!-- Real 3D Nissan GLTF Model -->
      <a-gltf-model 
        id="nissan-car" 
        class="clickable" 
        src="#nissanModel"
        position="0 -0.18 0.1" 
        scale="0.45 0.45 0.45" 
        rotation="90 0 0"
        animation="property: rotation; to: 90 360 0; loop: true; dur: 14000; easing: linear">
      </a-gltf-model>

      <!-- Fully 3D Interactive Petromin Corporate Info Card Panel -->
      <a-entity 
        id="info-3d-plane" 
        class="clickable"
        position="0 0.35 0.15" 
        rotation="0 0 0" 
        scale="0 0 0">
        
        <!-- Background Plate - Styled with Petromin's Classic Red and Deep Gray/Black Theme -->
        <a-plane 
          width="0.85" 
          height="0.60" 
          material="color: #151515; opacity: 0.95; transparent: true; roughness: 0.5" 
          geometry="primitive: plane; skipCache: true">
          
          <!-- Outer Orange/Red Neon Border Edge Accent -->
          <a-ring color="#FF6D00" radius-inner="0.41" radius-outer="0.42" scale="1.05 1.1 1" position="0 0 0.001"></a-ring>

          <!-- Header -->
          <a-text 
            value="PETROMIN CORPORATION" 
            color="#D32F2F" 
            align="center" 
            width="0.75" 
            position="0 0.23 0.01" 
            font="aileron">
          </a-text>

          <!-- Core Corporate Details -->
          <a-text 
            value="ESTABLISHED: 1968 (Royal Decree) \nMARKETS ACTIVE: 40+ countries \nTEAM SIZE: 6,000+ Specialists" 
            color="#E0E0E0" 
            align="left" 
            width="0.55" 
            position="-0.35 0.08 0.01" 
            line-height="55"
            font="dejavu">
          </a-text>

          <!-- Corporate Summary -->
          <a-text 
            value="The leading ultra-modern multi-brand automotive \nservices and mobility solutions platform in Saudi Arabia. \nFrom premium lubricants to electric vehicle infrastructure." 
            color="#B0B0B0" 
            align="left" 
            width="0.45" 
            position="-0.35 -0.10 0.01" 
            line-height="45"
            font="dejavu">
          </a-text>

          <!-- Floating close action button pill (Classic Petromin Red) -->
          <a-plane 
            width="0.25" 
            height="0.07" 
            position="0 -0.24 0.01" 
            material="color: #D32F2F; shader: flat">
            <a-text value="CLOSE" color="#FFF" align="center" width="0.45" position="0 0 0.005" font="aileron"></a-text>
          </a-plane>

        </a-plane>
      </a-entity>

    </a-entity>
  </scene>

  <script>
    const loadingScreen = document.getElementById('loading');
    const scanGuide = document.getElementById('scan-guide');
    const targetEntity = document.getElementById('ar-target');
    const sceneEl = document.getElementById('ar-scene');
    const hudInstruction = document.getElementById('hud-instruction');

    // Dynamic Host Target Resolver
    function buildTargetUrl() {
      const path = window.location.pathname;
      const segments = path.split('/').filter(s => s !== "");
      if (segments.length > 0 && !path.endsWith('.html')) {
        return `/${segments[0]}/targets.mind`;
      }
      return 'targets.mind';
    }

    const targetUrl = buildTargetUrl();
    sceneEl.setAttribute('mindar-image', `imageTargetSrc: ${targetUrl}; filterMinCF:0.001; filterBeta: 10`);

    // Hide loader when Web camera is ready
    sceneEl.addEventListener("arReady", () => {
      loadingScreen.style.opacity = '0';
      setTimeout(() => {
        loadingScreen.style.display = 'none';
      }, 500);
    });

    // Toggle HUD based on tracking status
    targetEntity.addEventListener("targetFound", () => {
      scanGuide.style.display = 'none';
      hudInstruction.style.display = 'block';
    });

    targetEntity.addEventListener("targetLost", () => {
      scanGuide.style.display = 'block';
      hudInstruction.style.display = 'none';
    });
  </script>
</body>
</html>
