<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Petromin AR Game - Pro Edition</title>
  
  <!-- Stable A-Frame & MindAR CDN pairing -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #000;
      -webkit-tap-highlight-color: transparent;
    }

    /* Loading Screen using Petromin's corporate color palette */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #D32F2F 0%, #FF6D00 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: white;
      transition: opacity 0.5s ease;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }

    .spinner {
      width: 55px;
      height: 55px;
      border: 5px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      border-top-color: #FFFFFF;
      animation: spin 1s linear infinite;
      margin-bottom: 25px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Diagnostics On-Screen Console */
    #error-console {
      display: none;
      background: rgba(0, 0, 0, 0.9);
      color: #FF8A80;
      padding: 15px;
      border-radius: 12px;
      font-family: monospace;
      font-size: 11px;
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      z-index: 10000;
      word-break: break-all;
      border: 1px solid #FF5252;
    }

    /* Scanner Target Bounds HUD */
    #scan-guide {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 260px;
      height: 260px;
      border: 2px dashed rgba(255, 255, 255, 0.35);
      border-radius: 24px;
      pointer-events: none;
      z-index: 10;
    }

    #scan-guide::before, #scan-guide::after,
    #scan-guide span::before, #scan-guide span::after {
      content: "";
      position: absolute;
      width: 35px;
      height: 35px;
      border-color: #FFFFFF;
      border-style: solid;
    }
    #scan-guide::before { top: -3px; left: -3px; border-width: 5px 0 0 5px; border-top-left-radius: 18px; }
    #scan-guide::after { top: -3px; right: -3px; border-width: 5px 5px 0 0; border-top-right-radius: 18px; }
    #scan-guide span::before { bottom: -3px; left: -3px; border-width: 0 0 5px 5px; border-bottom-left-radius: 18px; }
    #scan-guide span::after { bottom: -3px; right: -3px; border-width: 0 5px 5px 0; border-bottom-right-radius: 18px; }

    #scan-text {
      position: absolute;
      width: 100%;
      text-align: center;
      color: #FFFFFF;
      bottom: -50px;
      font-size: 13px;
      font-weight: bold;
      text-shadow: 0 2px 5px rgba(0,0,0,0.9);
      letter-spacing: 1px;
    }

    /* Game Container Overlay */
    #game-container {
      position: fixed;
      bottom: -100%;
      left: 0;
      width: 100%;
      height: 80vh;
      background: #09090d;
      border-top-left-radius: 28px;
      border-top-right-radius: 28px;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.6);
      z-index: 100;
      transition: bottom 0.5s cubic-bezier(0.1, 0.76, 0.55, 0.94);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #game-container.active {
      bottom: 0;
    }

    .card-handle {
      width: 36px;
      height: 5px;
      background: #2c2c35;
      border-radius: 10px;
      margin: 12px auto 8px;
      flex-shrink: 0;
    }

    /* Header Panel */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px 10px;
      color: #fff;
    }

    .game-header h2 {
      margin: 0;
      font-size: 18px;
      background: linear-gradient(90deg, #FF9100, #D32F2F);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .hud-metrics {
      display: flex;
      gap: 15px;
      font-family: monospace;
      font-size: 14px;
      align-items: center;
    }

    .metric-box {
      background: #151520;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid #2a2a3a;
    }

    #score-text {
      color: #00FFCC;
      text-shadow: 0 0 5px rgba(0, 255, 210, 0.3);
    }

    #speed-text {
      color: #FFD54F;
    }

    /* Canvas wrappers and UI menus */
    .canvas-wrapper {
      position: relative;
      flex-grow: 1;
      width: 100%;
      background: #050508;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .game-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(4, 4, 6, 0.92);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      z-index: 105;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .game-overlay h3 {
      margin: 0;
      font-weight: 800;
      letter-spacing: 1.5px;
    }

    .game-overlay p {
      line-height: 1.6;
    }

    .game-overlay button {
      background: linear-gradient(90deg, #D32F2F, #FF6D00);
      color: white;
      border: none;
      padding: 14px 35px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: transform 0.1s ease;
    }

    .game-overlay button:active {
      transform: scale(0.96);
    }

    .scanner-exit-btn {
      background: transparent !important;
      border: 2px solid #FF6D00 !important;
      color: #FF6D00 !important;
      box-shadow: none !important;
      margin-top: 12px !important;
    }

    /* Legend/How-to visual elements in starting overlay */
    .legend-box {
      display: flex;
      gap: 15px;
      margin: 15px 0;
      background: rgba(255,255,255,0.04);
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 11px;
      text-align: left;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>

  <!-- Loading Animation Overlay -->
  <div id="loading">
    <div class="spinner"></div>
    <h3 style="margin:0; letter-spacing: 1px;">PETROMIN AR</h3>
    <p style="font-size:12px; opacity:0.8; margin-top:5px; font-weight: 500;">Accessing Camera Feed...</p>
  </div>

  <!-- On-Screen Console for Diagnostics -->
  <div id="error-console"></div>

  <!-- HUD Overlay -->
  <div id="scan-guide">
    <span></span>
    <div id="scan-text">ALIGN WITH PETROMIN LOGO</div>
  </div>

  <!-- Interactive 2D Game Drawer -->
  <div id="game-container">
    <div class="card-handle"></div>
    <div class="game-header">
      <h2>PETROMIN RUN</h2>
      <div class="hud-metrics">
        <div class="metric-box" id="speed-text">100 KM/H</div>
        <div class="metric-box" id="score-text">SCORE: 00</div>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>
      
      <!-- Start Overlay -->
      <div id="start-overlay" class="game-overlay">
        <h3 style="font-size: 26px; color: #FF6D00; margin-bottom: 5px;">PETROLUBE PRO CHALLENGE</h3>
        <p style="font-size: 12px; color: #aaa; margin: 0 0 10px;">Drag your Truck left & right. The highway gets faster every second!</p>
        
        <div class="legend-box">
          <div class="legend-item">
            <span style="display:inline-block; width:10px; height:10px; background:#FF9100; border-radius:50%;"></span>
            <span>Oil (+10 pts)</span>
          </div>
          <div class="legend-item">
            <span style="display:inline-block; width:10px; height:10px; background:#00E676; border-radius:2px;"></span>
            <span>Fuel (Keep Moving)</span>
          </div>
          <div class="legend-item">
            <span style="display:inline-block; width:10px; height:10px; background:#FF1744; transform:rotate(45deg);"></span>
            <span>Wrench (Danger)</span>
          </div>
        </div>

        <button onclick="startGame()">START HIGHWAY</button>
      </div>

      <!-- Game Over Overlay -->
      <div id="gameover-overlay" class="game-overlay" style="display: none;">
        <h3 style="font-size: 28px; color: #D32F2F;">VEHICLE CRASHED</h3>
        <p id="final-score-text" style="font-size: 16px; margin: 8px 0; color: #00FFCC;">Final Score: 0</p>
        <p id="game-over-reason" style="font-size: 12px; color: #aaa; max-width: 250px; margin-bottom: 10px;"></p>
        <button onclick="startGame()">RETRY RUN</button>
        <button class="scanner-exit-btn" onclick="resetScanner()">SCAN ANOTHER LOGO</button>
      </div>
    </div>
  </div>

  <!-- AR Scene -->
  <a-scene 
    id="ar-scene"
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Index 0 corresponds to the compiled logo marker inside targets.mind -->
    <a-entity id="ar-target" mindar-image-target="targetIndex: 0"></a-entity>
  </scene>

  <script>
    const loadingScreen = document.getElementById('loading');
    const scanGuide = document.getElementById('scan-guide');
    const gameContainer = document.getElementById('game-container');
    const targetEntity = document.getElementById('ar-target');
    const sceneEl = document.getElementById('ar-scene');
    const errConsole = document.getElementById('error-console');

    // Display error stack if file compilation fails
    function showRuntimeError(message) {
      errConsole.style.display = 'block';
      errConsole.innerHTML += '<strong>[System Check]:</strong> ' + message + '<br>';
    }

    // Capture global page failures
    window.onerror = function(msg, url, line) {
      showRuntimeError(`${msg} (line ${line})`);
      return false;
    };

    // Auto-detect if host path is root or subfolder (GitHub Pages Repo setup)
    function buildTargetUrl() {
      const path = window.location.pathname;
      const segments = path.split('/').filter(s => s !== "");
      
      // If deployed in a GitHub sub-repository
      if (segments.length > 0 && !path.endsWith('.html')) {
        return `/${segments[0]}/targets.mind`;
      }
      return 'targets.mind';
    }

    const targetUrl = buildTargetUrl();
    sceneEl.setAttribute('mindar-image', `imageTargetSrc: ${targetUrl}; filterMinCF:0.001; filterBeta: 10`);

    // Complete loading stage once engine is online
    sceneEl.addEventListener("arReady", () => {
      loadingScreen.style.opacity = '0';
      setTimeout(() => {
        loadingScreen.style.display = 'none';
      }, 500);
    });

    // Detect missing file or assets
    sceneEl.addEventListener("arError", () => {
      showRuntimeError(`Engine could not download target descriptor database at: ${window.location.origin}${targetUrl}`);
    });

    // Image target detection triggers information panel
    targetEntity.addEventListener("targetFound", () => {
      gameContainer.classList.add('active');
      scanGuide.style.display = 'none';
      initCanvas();
    });

    // Reset scanner viewport
    function resetScanner() {
      stopGame();
      gameContainer.classList.remove('active');
      setTimeout(() => {
        scanGuide.style.display = 'block';
      }, 300);
    }

    // ==========================================================
    //            UPGRADED 2D CANVAS ARCADE GAME (PRO EDITION)
    // ==========================================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startOverlay = document.getElementById('start-overlay');
    const gameoverOverlay = document.getElementById('gameover-overlay');
    const scoreText = document.getElementById('score-text');
    const speedText = document.getElementById('speed-text');
    const finalScoreText = document.getElementById('final-score-text');
    const gameOverReason = document.getElementById('game-over-reason');

    let gameActive = false;
    let score = 0;
    let lives = 3;
    let fuel = 100; // Max 100
    let gameSpeedMultiplier = 1; // Increases over time to scale challenge
    let animationId = null;

    // Player State
    const player = {
      x: 0,
      y: 0,
      width: 58,
      height: 38,
      targetX: 0, // for smoothed lerping movement
    };

    let items = [];
    let particles = [];
    let roadStripes = [];
    let frameCount = 0;
    let spawnRate = 35; // base frames between spawns

    function initCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
      player.x = canvas.width / 2 - player.width / 2;
      player.targetX = player.x;
      player.y = canvas.height - player.height - 25;

      // Pre-populate road stripes
      roadStripes = [];
      for (let y = -40; y < canvas.height; y += 80) {
        roadStripes.push({ y: y });
      }
    }

    // Capture Drag & Touch
    let isDragging = false;
    canvas.addEventListener('mousedown', (e) => { isDragging = true; trackInput(e); });
    canvas.addEventListener('mousemove', (e) => { if (isDragging) trackInput(e); });
    window.addEventListener('mouseup', () => { isDragging = false; });

    canvas.addEventListener('touchstart', (e) => { isDragging = true; trackInput(e.touches[0]); });
    canvas.addEventListener('touchmove', (e) => { if (isDragging) trackInput(e.touches[0]); e.preventDefault(); }, { passive: false });
    window.addEventListener('touchend', () => { isDragging = false; });

    function trackInput(input) {
      const rect = canvas.getBoundingClientRect();
      const relativeX = input.clientX - rect.left;
      player.targetX = Math.max(0, Math.min(canvas.width - player.width, relativeX - player.width / 2));
    }

    function startGame() {
      startOverlay.style.display = 'none';
      gameoverOverlay.style.display = 'none';
      initCanvas();
      
      score = 0;
      lives = 3;
      fuel = 100;
      gameSpeedMultiplier = 1;
      items = [];
      particles = [];
      gameActive = true;
      scoreText.innerText = `SCORE: 00`;
      
      if(animationId) cancelAnimationFrame(animationId);
      gameLoop();
    }

    function stopGame() {
      gameActive = false;
      if(animationId) cancelAnimationFrame(animationId);
    }

    function gameOver(reason) {
      gameActive = false;
      finalScoreText.innerText = `Final Score: ${score}`;
      gameOverReason.innerText = reason;
      gameoverOverlay.style.display = 'flex';
    }

    function spawnParticleBurst(x, y, color, count = 8) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x: x,
          y: y,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6,
          radius: 2 + Math.random() * 3,
          color: color,
          alpha: 1,
          decay: 0.02 + Math.random() * 0.03
        });
      }
    }

    function spawnItem() {
      const types = ['oil', 'oil', 'fuel', 'obstacle', 'obstacle'];
      const type = types[Math.floor(Math.random() * types.length)];
      
      items.push({
        x: 15 + Math.random() * (canvas.width - 45),
        y: -40,
        size: 26,
        type: type,
        speed: (2.5 + Math.random() * 3) * gameSpeedMultiplier,
        rotation: 0,
        rotSpeed: (Math.random() - 0.5) * 0.05
      });
    }

    function triggerScreenShake() {
      gameContainer.style.animation = 'none';
      setTimeout(() => gameContainer.style.animation = 'shake 0.35s cubic-bezier(.36,.07,.19,.97) both', 1);
    }

    function gameLoop() {
      if (!gameActive) return;

      // 1. Physics scaling updates
      gameSpeedMultiplier += 0.0002; // gradual acceleration
      const speedKmh = Math.floor(100 * gameSpeedMultiplier);
      speedText.innerText = `${speedKmh} KM/H`;

      // Slow depletion of fuel
      fuel -= 0.08 * gameSpeedMultiplier;
      if (fuel <= 0) {
        gameOver("Your engine sputtered out of fuel! Pick up fuel canisters.");
        return;
      }

      // Smooth horizontal truck movement (Interpolation)
      player.x += (player.targetX - player.x) * 0.22;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Draw modern asphalt roadway backdrop
      ctx.fillStyle = '#111116';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Left/Right road shoulder guardrails
      ctx.fillStyle = '#D32F2F'; // Red outline
      ctx.fillRect(0, 0, 8, canvas.height);
      ctx.fillRect(canvas.width - 8, 0, 8, canvas.height);

      // Draw moving center lines
      ctx.fillStyle = '#444455';
      roadStripes.forEach(stripe => {
        stripe.y += 4 * gameSpeedMultiplier;
        if (stripe.y > canvas.height) stripe.y = -60;
        ctx.fillRect(canvas.width / 2 - 3, stripe.y, 6, 35);
      });

      // 2. Spawn exhaust engine fumes behind truck
      if (Math.random() < 0.3) {
        particles.push({
          x: player.x + 10,
          y: player.y + player.height,
          vx: -0.5 - Math.random() * 1,
          vy: 1 + Math.random() * 2,
          radius: 3 + Math.random() * 4,
          color: 'rgba(255, 255, 255, 0.15)',
          alpha: 0.6,
          decay: 0.02
        });
      }

      // 3. Draw & process particles
      for (let p = particles.length - 1; p >= 0; p--) {
        const prt = particles[p];
        prt.x += prt.vx;
        prt.y += prt.vy;
        prt.alpha -= prt.decay;
        if (prt.alpha <= 0) {
          particles.splice(p, 1);
          continue;
        }
        ctx.save();
        ctx.globalAlpha = prt.alpha;
        ctx.fillStyle = prt.color;
        ctx.beginPath();
        ctx.arc(prt.x, prt.y, prt.radius, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }

      // 4. Draw detailed Petromin express service truck
      ctx.save();
      
      // Wheels (Animated)
      ctx.fillStyle = '#08080a';
      // Front wheel
      ctx.fillRect(player.x + 8, player.y + player.height - 3, 10, 6);
      // Rear wheel
      ctx.fillRect(player.x + player.width - 18, player.y + player.height - 3, 10, 6);

      // Main Truck Red Bed
      ctx.fillStyle = '#D32F2F';
      ctx.beginPath();
      ctx.roundRect(player.x + 2, player.y + 6, player.width - 18, player.height - 10, 4);
      ctx.fill();

      // Front Cab (Orange nose)
      ctx.fillStyle = '#FF6D00';
      ctx.beginPath();
      ctx.roundRect(player.x + player.width - 18, player.y + 10, 16, player.height - 14, 4);
      ctx.fill();

      // Corporate decals (Stylized white swoosh graphic)
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.moveTo(player.x + 6, player.y + 16);
      ctx.lineTo(player.x + player.width - 24, player.y + 16);
      ctx.lineTo(player.x + player.width - 20, player.y + 21);
      ctx.lineTo(player.x + 10, player.y + 21);
      ctx.closePath();
      ctx.fill();

      // Cabin windshield & windows
      ctx.fillStyle = '#80DEEA';
      ctx.fillRect(player.x + player.width - 12, player.y + 12, 8, 7);

      // Yellow Headlights glow beam
      const pulseBeam = 15 + Math.sin(frameCount * 0.1) * 5;
      const gradient = ctx.createLinearGradient(player.x + player.width - 2, player.y + 22, player.x + player.width + pulseBeam, player.y + 22);
      gradient.addColorStop(0, 'rgba(255, 235, 59, 0.6)');
      gradient.addColorStop(1, 'rgba(255, 235, 59, 0)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.moveTo(player.x + player.width - 2, player.y + 20);
      ctx.lineTo(player.x + player.width + pulseBeam, player.y + 12);
      ctx.lineTo(player.x + player.width + pulseBeam, player.y + 30);
      ctx.lineTo(player.x + player.width - 2, player.y + 24);
      ctx.closePath();
      ctx.fill();

      ctx.restore();

      // 5. Falling items rendering
      frameCount++;
      const speedAdjustedSpawn = Math.max(12, Math.floor(spawnRate / gameSpeedMultiplier));
      if (frameCount % speedAdjustedSpawn === 0) {
        spawnItem();
      }

      for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        item.y += item.speed;
        item.rotation += item.rotSpeed;

        // Bounding calculation box
        if (
          item.x < player.x + player.width &&
          item.x + item.size > player.x &&
          item.y < player.y + player.height &&
          item.y + item.size > player.y
        ) {
          // Impact Event
          if (item.type === 'oil') {
            score += 10;
            scoreText.innerText = `SCORE: ${score}`;
            spawnParticleBurst(item.x + item.size/2, item.y + item.size/2, '#FF9100', 8);
          } else if (item.type === 'fuel') {
            fuel = Math.min(100, fuel + 25);
            spawnParticleBurst(item.x + item.size/2, item.y + item.size/2, '#00E676', 12);
          } else if (item.type === 'obstacle') {
            lives--;
            spawnParticleBurst(item.x + item.size/2, item.y + item.size/2, '#FF1744', 15);
            triggerScreenShake();
            if (lives <= 0) {
              gameOver("Your utility truck sustained critical structural damage!");
              return;
            }
          }
          items.splice(i, 1);
          continue;
        }

        // Drop if past screen bounds
        if (item.y > canvas.height) {
          items.splice(i, 1);
          continue;
        }

        // Draw items with rotation matrix 
        ctx.save();
        ctx.translate(item.x + item.size / 2, item.y + item.size / 2);
        ctx.rotate(item.rotation);

        if (item.type === 'oil') {
          // Glow Backplate
          ctx.shadowBlur = 8;
          ctx.shadowColor = '#FF9100';
          // Oil Droplet detailed path
          ctx.fillStyle = '#FF9100';
          ctx.beginPath();
          ctx.moveTo(0, -item.size / 2);
          ctx.bezierCurveTo(item.size / 2, 0, item.size / 2, item.size / 2, 0, item.size / 2);
          ctx.bezierCurveTo(-item.size / 2, item.size / 2, -item.size / 2, 0, 0, -item.size / 2);
          ctx.closePath();
          ctx.fill();
          // Inner core highlights
          ctx.fillStyle = '#FFE082';
          ctx.beginPath();
          ctx.arc(-2, 2, 3, 0, Math.PI*2);
          ctx.fill();
        } 
        else if (item.type === 'fuel') {
          // Green Fuel canister canister
          ctx.shadowBlur = 8;
          ctx.shadowColor = '#00E676';
          ctx.fillStyle = '#00E676';
          // Body
          ctx.fillRect(-item.size/3, -item.size/3, (item.size/3)*2, (item.size/3)*2);
          // Handle
          ctx.fillStyle = '#00B0FF';
          ctx.fillRect(-item.size/4, -item.size/2, item.size/2, 4);
          // Lettering F
          ctx.fillStyle = '#FFFFFF';
          ctx.font = 'bold 9px Arial';
          ctx.fillText("F", -3, 3);
        } 
        else {
          // Obstacle metal wrench with dangerous pulsing red shadow
          ctx.shadowBlur = 6;
          ctx.shadowColor = '#FF1744';
          ctx.fillStyle = '#90A4AE';
          // Shaft
          ctx.fillRect(-3, -item.size/2 + 2, 6, item.size - 4);
          // Two jaws ends
          ctx.beginPath();
          ctx.arc(0, -item.size/2 + 3, 6, 0, Math.PI*2);
          ctx.arc(0, item.size/2 - 3, 6, 0, Math.PI*2);
          ctx.fill();
          // Jaw cutout detail
          ctx.fillStyle = '#111116';
          ctx.fillRect(-2, -item.size/2, 4, 3);
          ctx.fillRect(-2, item.size/2 - 3, 4, 3);
        }
        ctx.restore();
      }

      // 6. Top UI Overlay Metrics (Fuel indicators & Remaining hearts)
      // Draw Dashboard Bar Backdrop
      ctx.fillStyle = 'rgba(20, 20, 30, 0.7)';
      ctx.beginPath();
      ctx.roundRect(15, 12, 105, 30, 8);
      ctx.fill();

      // Active Remaining Hearts
      for (let l = 0; l < 3; l++) {
        ctx.fillStyle = l < lives ? '#FF1744' : '#263238';
        // Heart drawing vector shape
        ctx.beginPath();
        const hx = 24 + l * 18;
        const hy = 20;
        ctx.arc(hx - 3, hy, 3, 0, Math.PI, true);
        ctx.arc(hx + 3, hy, 3, 0, Math.PI, true);
        ctx.lineTo(hx, hy + 7);
        ctx.closePath();
        ctx.fill();
      }

      // Fuel Progress Bar
      ctx.fillStyle = '#37474F';
      ctx.fillRect(24, 32, 80, 5);
      const fuelColor = fuel > 40 ? '#00E676' : '#FF1744';
      ctx.fillStyle = fuelColor;
      ctx.fillRect(24, 32, 80 * (fuel / 100), 5);

      animationId = requestAnimationFrame(gameLoop);
    }
  </script>

  <!-- High performance CSS transitions -->
  <style>
    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }
  </style>
