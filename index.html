<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Petromin AR - Retro Hackathon Edition</title>
  
  <!-- Stable A-Frame & MindAR CDN pairing -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <!-- Classic 8-bit Pixel Font -->
  <link href="https://fonts.googleapis.com/css2=family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    /* Prevent rubber-banding or text selection highlighting on fast taps */
    * {
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace; /* Pixel Font */
      background-color: #000;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      image-rendering: pixelated; /* Force pixelated rendering for the whole page */
    }

    /* Pixelated Loading Screen */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #D32F2F;
      /* Retro grid background pattern */
      background-image: linear-gradient(#b71c1c 1px, transparent 1px), linear-gradient(90deg, #b71c1c 1px, transparent 1px);
      background-size: 20px 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: white;
      transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      padding: 20px;
      text-align: center;
    }

    /* 8-bit Blocky Spinner */
    .spinner {
      width: 40px;
      height: 40px;
      background: #FFF;
      margin-bottom: 25px;
      animation: spin-step 1s steps(4) infinite; /* Snappy, low-framerate rotation */
      box-shadow: 6px 6px 0px #000;
    }

    @keyframes spin-step {
      to { transform: rotate(360deg); }
    }

    .blink-text {
      animation: blinker 1s step-start infinite;
    }

    @keyframes blinker {
      50% { opacity: 0; }
    }

    /* Diagnostics On-Screen Console */
    #error-console {
      display: none;
      background: #000;
      color: #00FFCC;
      padding: 15px;
      border: 4px solid #FF5252;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      z-index: 10000;
      word-break: break-all;
      box-shadow: 4px 4px 0px rgba(255, 82, 82, 0.5);
    }

    /* Scanner Target Bounds HUD - Blocky Style */
    #scan-guide {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 260px;
      height: 260px;
      border: 4px dashed rgba(255, 255, 255, 0.5); /* Thicker, sharper dash */
      pointer-events: none;
      z-index: 10;
    }

    #scan-guide span {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Sharp framing corners */
    #scan-guide::before, #scan-guide::after,
    #scan-guide span::before, #scan-guide span::after {
      content: "";
      position: absolute;
      width: 40px;
      height: 40px;
      border-color: #00FFCC;
      border-style: solid;
    }
    #scan-guide::before { top: -6px; left: -6px; border-width: 8px 0 0 8px; }
    #scan-guide::after { top: -6px; right: -6px; border-width: 8px 8px 0 0; }
    #scan-guide span::before { bottom: -6px; left: -6px; border-width: 0 0 8px 8px; }
    #scan-guide span::after { bottom: -6px; right: -6px; border-width: 0 8px 8px 0; }

    #scan-text {
      position: absolute;
      width: 100%;
      text-align: center;
      color: #00FFCC;
      bottom: -60px;
      font-size: 10px;
      line-height: 1.5;
      text-shadow: 2px 2px 0px #000;
    }

    /* Game Container Overlay */
    #game-container {
      position: fixed;
      bottom: -100%;
      left: 0;
      width: 100%;
      height: 85vh;
      background: #09090d;
      border-top: 6px solid #FF6D00; /* Sharp top border instead of radius */
      z-index: 100;
      transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-bottom: env(safe-area-inset-bottom);
    }

    #game-container.active {
      bottom: 0;
    }

    /* Header Panel */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px 15px;
      background: #000;
      border-bottom: 4px solid #1a1a26;
      color: #fff;
    }

    .game-header h2 {
      margin: 0;
      font-size: 12px;
      color: #FF6D00;
      text-shadow: 2px 2px 0px #D32F2F;
    }

    .hud-metrics {
      display: flex;
      align-items: center;
    }

    .metric-box {
      background: #000;
      padding: 8px;
      border: 2px solid #00FFCC;
      box-shadow: 2px 2px 0px #005544;
    }

    #score-text {
      color: #00FFCC;
      font-size: 10px;
    }

    /* Canvas wrappers and UI menus */
    .canvas-wrapper {
      position: relative;
      flex-grow: 1;
      width: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-bottom: 4px solid #1a1a26;
    }

    #gameCanvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      image-rendering: pixelated; /* Keeps canvas drawing sharp */
    }

    /* Mobile Joystick - Retro D-PAD Style */
    #controls-container {
      width: 100%;
      height: 180px;
      background: #09090d;
      /* Grid background */
      background-image: linear-gradient(#151524 2px, transparent 2px), linear-gradient(90deg, #151524 2px, transparent 2px);
      background-size: 20px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      flex-shrink: 0;
    }

    /* D-Pad Base */
    #joystick-boundary {
      width: 140px;
      height: 140px;
      background: #111;
      border: 4px solid #333;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 6px 6px 0px #000;
      touch-action: none;
      /* Paint a cross inside */
      background-image:
        linear-gradient(to right, transparent 33%, #222 33%, #222 67%, transparent 67%),
        linear-gradient(to bottom, transparent 33%, #222 33%, #222 67%, transparent 67%);
    }

    /* Square Pixel Stick */
    #joystick-stick {
      width: 44px;
      height: 44px;
      background: #FF6D00;
      border: 4px solid #FFF;
      position: absolute;
      touch-action: none;
      box-shadow: 4px 4px 0px #D32F2F;
      will-change: transform;
      z-index: 2;
    }

    #joystick-stick:active {
      background: #00FFCC;
      box-shadow: 2px 2px 0px #008877;
      border-color: #FFF;
    }

    /* Overlays */
    .game-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      z-index: 105;
      text-align: center;
      padding: 24px;
      border: 4px solid #1a1a26;
    }

    .game-overlay h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.4;
      color: #FF6D00;
      text-shadow: 3px 3px 0px #D32F2F;
    }

    .game-overlay p {
      font-size: 9px;
      line-height: 1.8;
      color: #ccc;
    }

    /* Pixel Arcade Button */
    .game-overlay button {
      font-family: 'Press Start 2P', monospace;
      background: #FF6D00;
      color: white;
      border: 4px solid #FFF;
      padding: 15px 25px;
      font-size: 12px;
      cursor: pointer;
      margin-top: 25px;
      box-shadow: 6px 6px 0px #D32F2F;
      text-transform: uppercase;
      transition: all 0.1s;
    }

    .game-overlay button:active {
      transform: translate(4px, 4px);
      box-shadow: 2px 2px 0px #D32F2F;
    }

    /* Pixel Legend */
    .legend-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 20px 0;
      background: #111;
      padding: 15px;
      border: 2px solid #333;
      font-size: 8px;
      text-align: left;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Square color indicators */
    .legend-color {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #FFF;
    }
  </style>
</head>
<body>

  <!-- Loading Animation Overlay -->
  <div id="loading">
    <div class="spinner"></div>
    <h3 style="margin:0; font-size:16px; text-shadow: 4px 4px 0px #000;">PETROMIN AR</h3>
    <p class="blink-text" style="font-size:10px; margin-top:20px; color:#FFCDD2;">INSERT COIN...</p>
  </div>

  <!-- On-Screen Console for Diagnostics -->
  <div id="error-console"></div>

  <!-- HUD Overlay -->
  <div id="scan-guide">
    <span></span>
    <div id="scan-text">SYS.SCAN:<br><br>ALIGN LOGO TO HACK</div>
  </div>

  <!-- Interactive 2D Game Drawer -->
  <div id="game-container">
    
    <div class="game-header">
      <h2>PETRO-HACK</h2>
      <div class="hud-metrics">
        <div class="metric-box" id="score-text">DATA: 0</div>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>
      
      <!-- Interactive Retro D-Pad -->
      <div id="controls-container">
        <div id="joystick-boundary">
          <div id="joystick-stick"></div>
        </div>
      </div>

      <!-- Start Overlay -->
      <div id="start-overlay" class="game-overlay">
        <h3 style="color: #FF6D00;">PIPELINE BYPASS</h3>
        <p style="margin-top: 15px; color: #FFF;">Use D-PAD to route data.<br>Target goal: 150 DATA nodes.</p>
        
        <div class="legend-box">
          <div class="legend-item">
            <span class="legend-color" style="background:#FF9100; border-color:#FF3D00;"></span>
            <span>Standard Node (+10)</span>
          </div>
          <div class="legend-item">
            <span class="legend-color" style="background:#00FFCC; border-color:#008877;"></span>
            <span>Overclock Node (Speedup)</span>
          </div>
        </div>

        <button onclick="startGame()">INITIATE</button>
      </div>

      <!-- Game Over Overlay -->
      <div id="gameover-overlay" class="game-overlay" style="display: none;">
        <h3 style="color: #D32F2F;">FATAL ERROR!</h3>
        <p id="final-score-text" style="font-size: 10px; margin: 15px 0; color: #00FFCC;">Total Data: 0</p>
        <p id="game-over-reason" style="font-size: 8px; color: #777; max-width: 250px; margin-bottom: 20px;"></p>
        <button onclick="startGame()">REBOOT</button>
      </div>

      <!-- Victory Overlay -->
      <div id="win-overlay" class="game-overlay" style="display: none; border-color: #00FFCC;">
        <h3 style="color: #00FFCC; text-shadow: 3px 3px 0px #005544;">HACK COMPLETE!</h3>
        <p style="margin-top: 15px; color: #FFF; font-size: 10px; line-height: 1.8;">Core database bypassed.<br>Petromin terminal clear.</p>
        <button onclick="startGame()" style="background: #00FFCC; color: #000; box-shadow: 6px 6px 0px #005544;">PLAY AGAIN</button>
      </div>
    </div>
  </div>

  <!-- AR Scene -->
  <a-scene 
    id="ar-scene"
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity id="ar-target" mindar-image-target="targetIndex: 0"></a-entity>
  </scene>

  <script>
    const loadingScreen = document.getElementById('loading');
    const scanGuide = document.getElementById('scan-guide');
    const gameContainer = document.getElementById('game-container');
    const targetEntity = document.getElementById('ar-target');
    const sceneEl = document.getElementById('ar-scene');
    const errConsole = document.getElementById('error-console');

    function showRuntimeError(message) {
      errConsole.style.display = 'block';
      errConsole.innerHTML += '<strong>[ERR]:</strong> ' + message + '<br>';
    }

    window.onerror = function(msg, url, line) {
      showRuntimeError(`${msg} (line ${line})`);
      return false;
    };

    function buildTargetUrl() {
      const path = window.location.pathname;
      const segments = path.split('/').filter(s => s !== "");
      if (segments.length > 0 && !path.endsWith('.html')) {
        return `/${segments[0]}/targets.mind`;
      }
      return 'targets.mind';
    }

    const targetUrl = buildTargetUrl();
    sceneEl.setAttribute('mindar-image', `imageTargetSrc: ${targetUrl}; filterMinCF:0.001; filterBeta: 10`);

    sceneEl.addEventListener("arReady", () => {
      loadingScreen.style.opacity = '0';
      setTimeout(() => {
        loadingScreen.style.display = 'none';
      }, 400);
    });

    sceneEl.addEventListener("arError", () => {
      showRuntimeError(`DB_MISSING: ${window.location.origin}${targetUrl}`);
    });

    targetEntity.addEventListener("targetFound", () => {
      gameContainer.classList.add('active');
      scanGuide.style.display = 'none';
      setTimeout(initCanvas, 400);
    });

    // ==========================================================
    //       RETRO PIXEL PIPELINE GAME ENGINE
    // ==========================================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startOverlay = document.getElementById('start-overlay');
    const gameoverOverlay = document.getElementById('gameover-overlay');
    const winOverlay = document.getElementById('win-overlay');
    const scoreText = document.getElementById('score-text');
    const finalScoreText = document.getElementById('final-score-text');
    const gameOverReason = document.getElementById('game-over-reason');

    const gridSize = 16; // 16x16 chunky grid for better pixel look
    let tileCountX = 0;
    let tileCountY = 0;
    let gridCellWidth = 0;
    let gridCellHeight = 0;

    let pipeline = [];
    let dx = 1; 
    let dy = 0; 
    let inputQueue = [];

    let oilDrop = { x: 0, y: 0, special: false };
    let score = 0;
    let gameActive = false;
    let lastTickTime = 0;
    
    let baseSpeed = 130; 
    let currentSpeed = baseSpeed;

    function initCanvas() {
      const wrapper = canvas.parentElement;
      const rect = wrapper.getBoundingClientRect();
      const margin = 20;
      // Keep canvas perfectly square for even pixel distribution
      const size = Math.floor(Math.min(rect.width - margin, rect.height - margin));
      
      canvas.width = size;
      canvas.height = size;

      tileCountX = gridSize;
      tileCountY = gridSize;
      gridCellWidth = Math.floor(size / tileCountX);
      gridCellHeight = Math.floor(size / tileCountY);

      if (gameActive) {
        drawGame();
      }
    }

    window.addEventListener('resize', () => {
      if (gameContainer.classList.contains('active')) {
        requestAnimationFrame(initCanvas);
      }
    });

    function setDirection(newDx, newDy) {
      if (!gameActive) return;
      
      const lastMove = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : { dx: dx, dy: dy };

      if ((newDx === -1 && lastMove.dx === 1) || (newDx === 1 && lastMove.dx === -1)) return;
      if ((newDy === -1 && lastMove.dy === 1) || (newDy === 1 && lastMove.dy === -1)) return;

      if (inputQueue.length < 2) {
        inputQueue.push({ dx: newDx, dy: newDy });
      }
    }

    // ==========================================================
    //      HIGH-SPEED D-PAD ENGINE
    // ==========================================================
    const joystickBoundary = document.getElementById('joystick-boundary');
    const joystickStick = document.getElementById('joystick-stick');
    
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let currentPointerX = 0;
    let currentPointerY = 0;
    const maxDistance = 45; // Boundaries for square base
    const deadzone = 8; 

    function handleStart(clientX, clientY) {
      isDragging = true;
      const rect = joystickBoundary.getBoundingClientRect();
      dragStartX = rect.left + rect.width / 2;
      dragStartY = rect.top + rect.height / 2;
      currentPointerX = clientX;
      currentPointerY = clientY;
      
      joystickStick.style.transition = 'none';
      
      // Calculate initial snap if starting click off-center
      processJoystickPhysics(); 
    }

    // Snap to 4 directions visually like a real D-Pad
    function processJoystickPhysics() {
      if (!isDragging) return;

      const deltaX = currentPointerX - dragStartX;
      const deltaY = currentPointerY - dragStartY;
      
      // Force orthographic snapping visually for the retro theme
      let targetX = 0;
      let targetY = 0;

      if (Math.abs(deltaX) > deadzone || Math.abs(deltaY) > deadzone) {
        if (Math.abs(deltaX) > Math.abs(deltaY)) {
           targetX = deltaX > 0 ? maxDistance : -maxDistance;
           setDirection(targetX > 0 ? 1 : -1, 0);
        } else {
           targetY = deltaY > 0 ? maxDistance : -maxDistance;
           setDirection(0, targetY > 0 ? 1 : -1);
        }
      }

      joystickStick.style.transform = `translate3d(${targetX}px, ${targetY}px, 0)`;
      requestAnimationFrame(processJoystickPhysics);
    }

    joystickBoundary.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleStart(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    window.addEventListener('touchmove', (e) => {
      if (isDragging) {
        currentPointerX = e.touches[0].clientX;
        currentPointerY = e.touches[0].clientY;
      }
    }, { passive: true });

    window.addEventListener('touchend', () => {
      if (!isDragging) return;
      isDragging = false;
      joystickStick.style.transition = 'transform 0.1s steps(2)'; // Chunky snap back
      joystickStick.style.transform = 'translate3d(0px, 0px, 0)';
    }, { passive: true });

    // Desktop Mouse Handlers
    joystickBoundary.addEventListener('mousedown', (e) => {
      handleStart(e.clientX, e.clientY);
    });

    window.addEventListener('mousemove', (e) => {
      if (isDragging) {
        currentPointerX = e.clientX;
        currentPointerY = e.clientY;
      }
    });

    window.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      joystickStick.style.transition = 'transform 0.1s steps(2)';
      joystickStick.style.transform = 'translate3d(0px, 0px, 0)';
    });

    window.addEventListener('keydown', (e) => {
      switch(e.key) {
        case 'ArrowUp': case 'w': case 'W': setDirection(0, -1); break;
        case 'ArrowDown': case 's': case 'S': setDirection(0, 1); break;
        case 'ArrowLeft': case 'a': case 'A': setDirection(-1, 0); break;
        case 'ArrowRight': case 'd': case 'D': setDirection(1, 0); break;
      }
    });

    function spawnOilDrop() {
      let valid = false;
      let rx, ry;
      while(!valid) {
        rx = Math.floor(Math.random() * tileCountX);
        ry = Math.floor(Math.random() * tileCountY);
        valid = !pipeline.some(segment => segment.x === rx && segment.y === ry);
      }
      oilDrop.x = rx;
      oilDrop.y = ry;
      oilDrop.special = Math.random() < 0.22; 
    }

    function startGame() {
      startOverlay.style.display = 'none';
      gameoverOverlay.style.display = 'none';
      winOverlay.style.display = 'none';
      initCanvas();

      score = 0;
      dx = 1;
      dy = 0;
      inputQueue = [];
      currentSpeed = baseSpeed;

      pipeline = [
        { x: 5, y: 8 },
        { x: 4, y: 8 },
        { x: 3, y: 8 }
      ];

      spawnOilDrop();
      gameActive = true;
      scoreText.innerText = `DATA: 0`;
      
      lastTickTime = performance.now();
      requestAnimationFrame(gameMainLoop);
    }

    function gameMainLoop(currentTime) {
      if (!gameActive) return;

      requestAnimationFrame(gameMainLoop);

      const delta = currentTime - lastTickTime;
      if (delta >= currentSpeed) {
        lastTickTime = currentTime - (delta % currentSpeed);
        updateGame();
        drawGame();
      }
    }

    function updateGame() {
      if (inputQueue.length > 0) {
        const nextMove = inputQueue.shift();
        dx = nextMove.dx;
        dy = nextMove.dy;
      }

      let nextX = pipeline[0].x + dx;
      let nextY = pipeline[0].y + dy;

      if (nextX < 0) nextX = tileCountX - 1;
      else if (nextX >= tileCountX) nextX = 0;

      if (nextY < 0) nextY = tileCountY - 1;
      else if (nextY >= tileCountY) nextY = 0;

      const head = { x: nextX, y: nextY };

      if (pipeline.some(segment => segment.x === head.x && segment.y === head.y)) {
        triggerLeak("SYSTEM CRASH: Stream intersected.");
        return;
      }

      pipeline.unshift(head);

      if (head.x === oilDrop.x && head.y === oilDrop.y) {
        if (oilDrop.special) {
          score += 25;
          currentSpeed = Math.max(50, currentSpeed - 12); 
        } else {
          score += 10;
          currentSpeed = Math.max(50, currentSpeed - 5);
        }
        scoreText.innerText = `DATA: ${score}`;

        // Win evaluation condition
        if (score >= 150) {
          triggerWin();
          return;
        }

        spawnOilDrop();
      } else {
        pipeline.pop();
      }
    }

    function triggerLeak(reason) {
      gameActive = false;
      finalScoreText.innerText = `Total Data: ${score}`;
      gameOverReason.innerText = reason;
      gameoverOverlay.style.display = 'flex';
    }

    function triggerWin() {
      gameActive = false;
      winOverlay.style.display = 'flex';
    }

    // Completely Pixelated Rendering System (No anti-aliasing/blur/arcs)
    function drawGame() {
      // Clear with dark pixel grid background
      ctx.fillStyle = '#050508';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = '#111116';
      ctx.lineWidth = 1;
      for (let i = 0; i <= tileCountX; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridCellWidth, 0);
        ctx.lineTo(i * gridCellWidth, canvas.height);
        ctx.stroke();
      }
      for (let j = 0; j <= tileCountY; j++) {
        ctx.beginPath();
        ctx.moveTo(0, j * gridCellHeight);
        ctx.lineTo(canvas.width, j * gridCellHeight);
        ctx.stroke();
      }

      // Draw Pixel Food (Square Block)
      ctx.save();
      const fx = oilDrop.x * gridCellWidth;
      const fy = oilDrop.y * gridCellHeight;
      const fOffset = 2; // 2px margin for grid gap

      if (oilDrop.special) {
        ctx.fillStyle = '#00FFCC';
      } else {
        ctx.fillStyle = '#FF9100';
      }

      ctx.fillRect(fx + fOffset, fy + fOffset, gridCellWidth - fOffset*2, gridCellHeight - fOffset*2);
      
      // Add a chunky highlight pixel to the food
      ctx.fillStyle = '#FFF';
      ctx.fillRect(fx + fOffset + 2, fy + fOffset + 2, 4, 4);
      ctx.restore();

      // Draw Pixel Pipeline Body
      pipeline.forEach((segment, index) => {
        const sx = segment.x * gridCellWidth;
        const sy = segment.y * gridCellHeight;
        const sOffset = 1; // 1px gap between body segments for chunky look

        if (index === 0) {
          // Head segment
          ctx.fillStyle = '#D32F2F';
          ctx.fillRect(sx + sOffset, sy + sOffset, gridCellWidth - sOffset*2, gridCellHeight - sOffset*2);

          // Pixel Eyes (Squares instead of arcs)
          ctx.fillStyle = '#FFFFFF';
          const eyeSize = 4;
          
          if (dx === 1) { 
            ctx.fillRect(sx + gridCellWidth - eyeSize - 2, sy + 2, eyeSize, eyeSize);
            ctx.fillRect(sx + gridCellWidth - eyeSize - 2, sy + gridCellHeight - eyeSize - 2, eyeSize, eyeSize);
          } else if (dx === -1) { 
            ctx.fillRect(sx + 2, sy + 2, eyeSize, eyeSize);
            ctx.fillRect(sx + 2, sy + gridCellHeight - eyeSize - 2, eyeSize, eyeSize);
          } else if (dy === 1) { 
            ctx.fillRect(sx + 2, sy + gridCellHeight - eyeSize - 2, eyeSize, eyeSize);
            ctx.fillRect(sx + gridCellWidth - eyeSize - 2, sy + gridCellHeight - eyeSize - 2, eyeSize, eyeSize);
          } else { 
            ctx.fillRect(sx + 2, sy + 2, eyeSize, eyeSize);
            ctx.fillRect(sx + gridCellWidth - eyeSize - 2, sy + 2, eyeSize, eyeSize);
          }
        } else {
          // Body segments
          ctx.fillStyle = '#FF6D00';
          ctx.fillRect(sx + sOffset, sy + sOffset, gridCellWidth - sOffset*2, gridCellHeight - sOffset*2);
        }
      });
    }
  </script>
</body>
