<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Petromin WebXR Spatial Collector</title>
  
  <!-- A-Frame WebXR Stable Release -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #000;
      -webkit-tap-highlight-color: transparent;
    }

    /* Core Safari Webkit click propagation patch */
    canvas.a-canvas {
      cursor: pointer !important;
      touch-action: none;
    }

    /* 2D HUD Scoring & Interactive AR Prompt Overlays */
    #hud {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(18, 18, 18, 0.95);
      border: 2px solid #FF6D00;
      border-radius: 30px;
      padding: 12px 24px;
      color: #FFFFFF;
      font-weight: 800;
      font-size: 14px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: none;
      box-shadow: 0 6px 20px rgba(0,0,0,0.6);
      letter-spacing: 1px;
    }

    #hud-dot {
      width: 10px;
      height: 10px;
      background-color: #D32F2F;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.6; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(0.95); opacity: 0.6; }
    }

    /* Action button specifically for Safari users and Sensor authorization */
    #ar-overlay-ui {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .btn {
      background: linear-gradient(90deg, #D32F2F, #FF6D00);
      color: white;
      border: none;
      padding: 16px 36px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);
      cursor: pointer;
      letter-spacing: 0.5px;
    }

    #sensor-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #111;
      z-index: 99999;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      padding: 30px;
      box-sizing: border-box;
    }
  </style>

  <script>
    let score = 0;
    const TARGET_OBJECTS = 5;

    // Component: Handle Tap/Click Interaction on the 3D Oil Boxes
    AFRAME.registerComponent('collectible-box', {
      init: function () {
        const el = this.el;

        const collect = () => {
          if (el.getAttribute('data-collected') === 'true') return;
          el.setAttribute('data-collected', 'true');

          // Audio Feedback (Synthesizer Beep)
          playBeep(600 + (score * 80));

          // Shrink animation before removal
          el.setAttribute('animation__shrink', {
            property: 'scale',
            to: '0 0 0',
            dur: 250,
            easing: 'easeInBack'
          });

          setTimeout(() => {
            if (el.parentNode) el.parentNode.removeChild(el);
            incrementScore();
          }, 250);
        };

        // Listen for both A-Frame standard clicks and raw touchstarts for Safari
        el.addEventListener('click', collect);
        el.addEventListener('touchstart', (e) => {
          e.preventDefault();
          collect();
        });
      }
    });

    // WebXR Hit-Testing Controller
    AFRAME.registerComponent('webxr-hit-controller', {
      init: function () {
        this.xrHitTestSource = null;
        this.viewerSpace = null;
        this.refSpace = null;

        // Watch for active WebXR Sessions
        this.el.sceneEl.addEventListener('enter-vr', () => {
          const session = this.el.sceneEl.xrSession;
          if (!session) return;

          // Request the viewer reference space and initialize WebXR hit source
          session.requestReferenceSpace('viewer').then((space) => {
            this.viewerSpace = space;
            session.requestHitTestSource({ space: this.viewerSpace }).then((source) => {
              this.xrHitTestSource = source;
            });
          });

          session.requestReferenceSpace('local').then((space) => {
            this.refSpace = space;
          });
        });

        // Hide reticle if session exits
        this.el.sceneEl.addEventListener('exit-vr', () => {
          this.xrHitTestSource = null;
          this.el.setAttribute('visible', false);
        });
      },

      tick: function () {
        if (!this.xrHitTestSource) return;

        const frame = this.el.sceneEl.frame;
        const session = this.el.sceneEl.xrSession;
        if (!frame || !session) return;

        // Perform spatial hit test
        const hitTestResults = frame.getHitTestResults(this.xrHitTestSource);
        if (hitTestResults.length > 0) {
          const pose = hitTestResults[0].getPose(this.refSpace);
          this.el.setAttribute('visible', true);
          
          // Move the reticle to match real-world floor surface coordinates
          this.el.setAttribute('position', {
            x: pose.transform.position.x,
            y: pose.transform.position.y,
            z: pose.transform.position.z
          });
        } else {
          this.el.setAttribute('visible', false);
        }
      }
    });

    function playBeep(frequency) {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(frequency, ctx.currentTime);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
        osc.start();
        osc.stop(ctx.currentTime + 0.2);
      } catch (e) {}
    }

    function incrementScore() {
      score++;
      document.getElementById('score-val').innerText = `${score} / ${TARGET_OBJECTS}`;

      if (score >= TARGET_OBJECTS) {
        document.getElementById('hud').innerHTML = `<span id="hud-dot" style="background-color: #4CAF50;"></span> ALL BOXES COLLECTED!`;
        
        // Render 3D Stats Card in front of camera view coordinates
        const card = document.querySelector('#results-card');
        card.setAttribute('position', '0 0 -2.0');
        card.setAttribute('animation__pop', {
          property: 'scale',
          to: '1.2 1.2 1.2',
          dur: 800,
          easing: 'easeOutBack'
        });
      }
    }

    // Manual Spawner for devices that do not support WebXR (Safari / Standard Desktop)
    function spawnStaticFallbackBoxes() {
      const container = document.querySelector('#collectibles-group');
      if (container.children.length > 0) return; // Already spawned

      for (let i = 0; i < TARGET_OBJECTS; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = 3.0 + Math.random() * 2.0; 
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const y = 0.5 + (Math.random() * 1.5);

        createOilBox(x, y, z);
      }
    }

    // Create the actual 3D Petromin Oil Box
    function createOilBox(x, y, z) {
      const container = document.querySelector('#collectibles-group');
      const boxEntity = document.createElement('a-entity');
      boxEntity.setAttribute('class', 'clickable');
      boxEntity.setAttribute('position', `${x} ${y} ${z}`);
      boxEntity.setAttribute('collectible-box', '');

      // Core Canister Model
      const can = document.createElement('a-box');
      can.setAttribute('width', '0.45');
      can.setAttribute('height', '0.65');
      can.setAttribute('depth', '0.22');
      can.setAttribute('material', 'color: #1A1A1A; roughness: 0.3; metalness: 0.2');
      boxEntity.appendChild(can);

      // Red Top Lid Cap
      const lid = document.createElement('a-cylinder');
      lid.setAttribute('radius', '0.07');
      lid.setAttribute('height', '0.08');
      lid.setAttribute('position', '0 0.34 0');
      lid.setAttribute('material', 'color: #D32F2F');
      boxEntity.appendChild(lid);

      // Petromin Brand Decal Label
      const label = document.createElement('a-plane');
      label.setAttribute('width', '0.42');
      label.setAttribute('height', '0.45');
      label.setAttribute('position', '0 0 0.112');
      label.setAttribute('material', 'color: #FF6D00');

      const text = document.createElement('a-text');
      text.setAttribute('value', 'PETROMIN\n\nPREMIUM\nOIL');
      text.setAttribute('color', '#FFFFFF');
      text.setAttribute('align', 'center');
      text.setAttribute('width', '1.1');
      text.setAttribute('position', '0 0 0.01');
      text.setAttribute('font', 'aileron');
      label.appendChild(text);
      boxEntity.appendChild(label);

      // Ambient Animation Loop (Float/Spin)
      boxEntity.setAttribute('animation__spin', {
        property: 'rotation',
        to: '0 360 0',
        loop: true,
        dur: 8000 + (Math.random() * 3000),
        easing: 'linear'
      });

      boxEntity.setAttribute('animation__bob', {
        property: 'position',
        from: `${x} ${y} ${z}`,
        to: `${x} ${y + 0.15} ${z}`,
        loop: true,
        dir: 'alternate',
        dur: 1500 + (Math.random() * 800),
        easing: 'easeInOutQuad'
      });

      container.appendChild(boxEntity);
    }
  </script>
</head>
<body>

  <!-- iOS Gyroscope Permission Dialog (Needed for Magic Window fallback on Safari) -->
  <div id="sensor-modal">
    <h2>Sensor Integration Access</h2>
    <p style="opacity: 0.8; max-width: 320px; font-size: 14px; line-height: 1.6;">
      To let you look around and spot hidden packages using Safari, we need access to your device's motion sensors.
    </p>
    <button class="btn" style="margin-top:20px;" onclick="requestSensors()">ALLOW SENSORS</button>
  </div>

  <!-- HUD Interface -->
  <div id="hud">
    <span id="hud-dot"></span>
    <span>PETROMIN SPATIAL: <span id="score-val">0 / 5</span></span>
  </div>

  <!-- WebXR Overlay Controls -->
  <div id="ar-overlay-ui">
    <!-- Visible only on mobile flat screens to manually trigger the AR device setup -->
    <button class="btn" id="start-ar-btn" style="display: none;" onclick="enterWebXR()">ENTER IMMERSIVE WEBAR</button>
  </div>

  <!-- WebGL Render Stage -->
  <!-- Configured with WebXR hit-test capability enabled -->
  <a-scene 
    webxr="optionalFeatures: hit-test, local-floor; requiredFeatures: local;"
    vr-mode-ui="enabled: false">
    
    <!-- Camera, Cursor, and Raycaster System -->
    <!-- cursor is optimized to prevent Safari "fuse" freeze-lock -->
    <a-camera id="camera" position="0 1.6 0" look-controls="magicWindowTrackingEnabled: true">
      <a-cursor 
        id="cursor"
        raycaster="objects: .clickable"
        material="color: #FF6D00; shader: flat"
        position="0 0 -1.2"
        geometry="primitive: ring; radiusInner: 0.012; radiusOuter: 0.020"
        fuse="false">
      </a-cursor>

      <!-- Mission Finish Presentation Card -->
      <a-entity id="results-card" position="0 0 -100" scale="0 0 0">
        <a-plane width="1.6" height="1.8" material="color: #121212; opacity: 0.96; roughness: 0.6">
          <a-ring color="#FF6D00" radius-inner="1.05" radius-outer="1.06" scale="1.02 1.02 1"></a-ring>
          
          <a-text value="MISSION COMPLETE" color="#FFFFFF" align="center" width="1.5" position="0 0.6 0.01" font="aileron" bold="true"></a-text>
          <a-text value="You found all Petromin Canisters!" color="#FF6D00" align="center" width="1.1" position="0 0.45 0.01" font="aileron"></a-text>
          
          <a-plane width="1.3" height="0.25" position="0 0.15 0.01" material="color: #1A1A1A">
            <a-text value="5 OF 5 LOCATED" color="#4CAF50" align="center" width="1.2" position="0 0.05 0.01" font="aileron" bold="true"></a-text>
            <a-text value="PERFECT RUN SCORE: 100%" color="#AAA" align="center" width="0.8" position="0 -0.06 0.01" font="dejavu"></a-text>
          </a-plane>

          <a-text 
            value="PETROMIN CORPORATION" 
            color="#FF6D00" 
            align="center" 
            width="0.9" 
            position="0 -0.15 0.01" 
            font="aileron"
            bold="true">
          </a-text>

          <a-text 
            value="Founded in 1968, Petromin is Saudi Arabia's leading modern multi-brand automotive services platform, managing state-of-the-art lubricant networks and commercial EV infrastructures." 
            color="#CCCCCC" 
            align="center" 
            width="1.3" 
            position="0 -0.38 0.01" 
            line-height="42"
            font="dejavu"
            wrap-count="40">
          </a-text>

          <!-- Reload Webapp Button -->
          <a-plane class="clickable" width="0.8" height="0.16" position="0 -0.68 0.02" material="color: #D32F2F; shader: flat" onclick="window.location.reload()">
            <a-text value="PLAY AGAIN" color="#FFFFFF" align="center" width="1.1" position="0 0 0.01" font="aileron" bold="true"></a-text>
          </a-plane>
        </a-plane>
      </a-entity>
    </a-camera>

    <!-- WebXR Hit Testing Target Reticle (Aligns to physical floor plane) -->
    <a-entity id="ar-reticle" webxr-hit-controller visible="false">
      <a-ring color="#FF6D00" rotation="-90 0 0" radius-inner="0.15" radius-outer="0.2" material="shader: flat; opacity: 0.8"></a-ring>
      <a-circle color="#D32F2F" rotation="-90 0 0" radius="0.05" material="shader: flat; opacity: 0.9"></a-circle>
    </a-entity>

    <!-- Global Stage Lights -->
    <a-light type="ambient" color="#FFF" intensity="0.8"></a-light>
    <a-light type="directional" color="#FF6D00" intensity="0.5" position="-1 3 1"></a-light>

    <!-- Space Anchor for generated 3D collectibles -->
    <a-entity id="collectibles-group"></a-entity>
  </a-scene>

  <script>
    const scene = document.querySelector('a-scene');

    // Run when the scene fully compiles
    scene.addEventListener('loaded', () => {
      // Check if the current browser environment can run full WebXR AR Core
      if (navigator.xr) {
        navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
          if (supported) {
            // Android Chrome / AR Headset detected! Show the XR button
            document.getElementById('start-ar-btn').style.display = 'block';
            
            // Spawn boxes dynamically onto real-world planes when they tap screen in WebXR
            scene.addEventListener('click', (event) => {
              if (scene.is('vr-mode')) {
                const reticle = document.querySelector('#ar-reticle');
                if (reticle.getAttribute('visible') && score < TARGET_OBJECTS) {
                  const pos = reticle.getAttribute('position');
                  createOilBox(pos.x, pos.y + 0.3, pos.z); // Spawn exactly on the floor!
                }
              }
            });
          } else {
            // Device supports WebXR but not AR (or it's iOS Safari fallback)
            spawnStaticFallbackBoxes();
          }
        });
      } else {
        // No WebXR support detected (standard Safari setup)
        spawnStaticFallbackBoxes();
      }
    });

    // Request WebXR Immersive AR mode
    function enterWebXR() {
      scene.enterVR(); // A-Frame auto-prompts immersive-ar if configured on the scene element
    }

    // Permission and initialization handler for Safari (iOS)
    function requestSensors() {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then(permissionState => {
            if (permissionState === 'granted') {
              document.getElementById('sensor-modal').style.display = 'none';
              spawnStaticFallbackBoxes();
            } else {
              alert("Sensor tracking denied. You'll need to enable it to look around in AR.");
            }
          })
          .catch(console.error);
      } else {
        document.getElementById('sensor-modal').style.display = 'none';
        spawnStaticFallbackBoxes();
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      // Only show iOS Safari sensor authorization prompt if we are on a Webkit-restricted device
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        document.getElementById('sensor-modal').style.display = 'flex';
      }
    });
  </script>
</body>
</html>
