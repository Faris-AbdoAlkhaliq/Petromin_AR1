<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Petromin AR - Modernized Edition</title>
  
  <!-- Stable A-Frame & MindAR CDN pairing -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <!-- Clean, Modern Geometric Font -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    /* Prevent rubber-banding or text selection highlighting on fast taps */
    * {
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #000;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    /* Smooth Loading Screen */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #D32F2F;
      background-image: radial-gradient(circle at center, #ef5350 0%, #b71c1c 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: white;
      transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      padding: 20px;
      text-align: center;
    }

    /* Smooth Spinner */
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      margin-bottom: 25px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .blink-text {
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* Diagnostics On-Screen Console */
    #error-console {
      display: none;
      background: rgba(0, 0, 0, 0.95);
      color: #00FFCC;
      padding: 15px;
      border: 2px solid #FF5252;
      border-radius: 8px;
      font-size: 11px;
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      z-index: 10000;
      word-break: break-all;
    }

    /* Scanner Target Bounds HUD - Smooth Style */
    #scan-guide {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 260px;
      height: 260px;
      border: 2px dashed rgba(255, 255, 255, 0.4);
      border-radius: 24px;
      pointer-events: none;
      z-index: 10;
    }

    #scan-guide span {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Clean framing corners */
    #scan-guide::before, #scan-guide::after,
    #scan-guide span::before, #scan-guide span::after {
      content: "";
      position: absolute;
      width: 30px;
      height: 30px;
      border-color: #00FFCC;
      border-style: solid;
    }
    #scan-guide::before { top: -2px; left: -2px; border-width: 4px 0 0 4px; border-top-left-radius: 16px; }
    #scan-guide::after { top: -2px; right: -2px; border-width: 4px 4px 0 0; border-top-right-radius: 16px; }
    #scan-guide span::before { bottom: -2px; left: -2px; border-width: 0 0 4px 4px; border-bottom-left-radius: 16px; }
    #scan-guide span::after { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; border-bottom-right-radius: 16px; }

    #scan-text {
      position: absolute;
      width: 100%;
      text-align: center;
      color: #00FFCC;
      bottom: -60px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      line-height: 1.5;
    }

    /* Game Container Overlay - Smoothed Drawer */
    #game-container {
      position: fixed;
      bottom: -100%;
      left: 0;
      width: 100%;
      height: 85vh;
      background: #0f1015;
      border-top: 4px solid #FF6D00;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      z-index: 100;
      transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-bottom: env(safe-area-inset-bottom);
      box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
    }

    #game-container.active {
      bottom: 0;
    }

    /* Header Panel */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 24px;
      background: #07080c;
      border-bottom: 1px solid #1f2230;
      color: #fff;
    }

    .game-header h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: #FF6D00;
    }

    .hud-metrics {
      display: flex;
      align-items: center;
    }

    .metric-box {
      background: #141622;
      padding: 6px 14px;
      border-radius: 30px;
      border: 1px solid rgba(0, 255, 204, 0.3);
    }

    #score-text {
      color: #00FFCC;
      font-size: 13px;
      font-weight: 600;
    }

    /* Canvas wrappers and UI menus */
    .canvas-wrapper {
      position: relative;
      flex-grow: 1;
      width: 100%;
      background: #090a0f;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #gameCanvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }

    /* Modern Rounded Control Pad */
    #controls-container {
      width: 100%;
      height: 180px;
      background: #07080c;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      flex-shrink: 0;
      border-top: 1px solid #1f2230;
    }

    /* Radial Joystick Base */
    #joystick-boundary {
      width: 130px;
      height: 130px;
      background: #141622;
      border-radius: 50%;
      border: 2px solid #2a2e45;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.4);
      touch-action: none;
    }

    /* Smooth Circular Thumbstick */
    #joystick-stick {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #FF8F00 0%, #FF6D00 100%);
      border-radius: 50%;
      position: absolute;
      touch-action: none;
      box-shadow: 0 6px 16px rgba(255, 109, 0, 0.4);
      will-change: transform;
      z-index: 2;
    }

    #joystick-stick:active {
      background: linear-gradient(135deg, #00FFCC 0%, #00bfa5 100%);
      box-shadow: 0 6px 16px rgba(0, 255, 204, 0.4);
    }

    /* Overlays */
    .game-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(9, 10, 15, 0.96);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      z-index: 105;
      text-align: center;
      padding: 30px;
    }

    .game-overlay h3 {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      color: #FF6D00;
    }

    .game-overlay p {
      font-size: 13px;
      line-height: 1.6;
      color: #8fa0dd;
    }

    /* Clean Modern Button */
    .game-overlay button {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      background: #FF6D00;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 16px 36px;
      font-size: 14px;
      letter-spacing: 0.5px;
      cursor: pointer;
      margin-top: 25px;
      box-shadow: 0 6px 20px rgba(255, 109, 0, 0.4);
      transition: all 0.2s ease;
    }

    .game-overlay button:active {
      transform: scale(0.96);
      box-shadow: 0 3px 10px rgba(255, 109, 0, 0.4);
    }

    /* Clean Legend Box */
    .legend-box {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin: 24px 0;
      background: #141622;
      padding: 16px 24px;
      border-radius: 16px;
      border: 1px solid #2a2e45;
      font-size: 12px;
      text-align: left;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Circular smooth color indicators */
    .legend-color {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
  </style>
</head>
<body>

  <!-- Loading Animation Overlay -->
  <div id="loading">
    <div class="spinner"></div>
    <h3 style="margin:0; font-size:20px; font-weight:800; letter-spacing:1px;">PETROMIN AR</h3>
    <p class="blink-text" style="font-size:12px; margin-top:15px; color:#FFCDD2; font-weight:600;">CONNECTING TO SYSTEM...</p>
  </div>

  <!-- On-Screen Console for Diagnostics -->
  <div id="error-console"></div>

  <!-- HUD Overlay -->
  <div id="scan-guide">
    <span></span>
    <div id="scan-text">ALIGN LOGO TO INITIALIZE</div>
  </div>

  <!-- Interactive Game Drawer -->
  <div id="game-container">
    
    <div class="game-header">
      <h2>PETRO-STREAM</h2>
      <div class="hud-metrics">
        <div class="metric-box" id="score-text">DATA: 0</div>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>
      
      <!-- Interactive Radial D-Pad -->
      <div id="controls-container">
        <div id="joystick-boundary">
          <div id="joystick-stick"></div>
        </div>
      </div>

      <!-- Start Overlay -->
      <div id="start-overlay" class="game-overlay">
        <h3>PIPELINE BYPASS</h3>
        <p style="margin-top: 10px;">Use the directional pad to route data streams.<br>Cross through outer walls safely.</p>
        
        <div class="legend-box">
          <div class="legend-item">
            <span class="legend-color" style="background:#FF9100; box-shadow: 0 0 8px #FF9100;"></span>
            <span>Standard Node (+10 Score)</span>
          </div>
          <div class="legend-item">
            <span class="legend-color" style="background:#00FFCC; box-shadow: 0 0 8px #00FFCC;"></span>
            <span>Overclock Node (Velocity Up)</span>
          </div>
        </div>

        <button onclick="startGame()">INITIATE FLOW</button>
      </div>

      <!-- Game Over Overlay -->
      <div id="gameover-overlay" class="game-overlay" style="display: none;">
        <h3 style="color: #FF5252;">STREAM INTERRUPTED</h3>
        <p id="final-score-text" style="font-size: 16px; margin: 12px 0; color: #00FFCC; font-weight: 600;">Total Data: 0</p>
        <p id="game-over-reason" style="font-size: 12px; color: #7f8fa4; max-width: 260px; margin-bottom: 20px;"></p>
        <button onclick="startGame()" style="background:#FF5252; box-shadow: 0 6px 20px rgba(255, 82, 82, 0.4);">REBOOT SYSTEM</button>
      </div>
    </div>
  </div>

  <!-- AR Scene -->
  <a-scene 
    id="ar-scene"
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity id="ar-target" mindar-image-target="targetIndex: 0"></a-entity>
  </scene>

  <script>
    const loadingScreen = document.getElementById('loading');
    const scanGuide = document.getElementById('scan-guide');
    const gameContainer = document.getElementById('game-container');
    const targetEntity = document.getElementById('ar-target');
    const sceneEl = document.getElementById('ar-scene');
    const errConsole = document.getElementById('error-console');

    function showRuntimeError(message) {
      errConsole.style.display = 'block';
      errConsole.innerHTML += '<strong>[ERR]:</strong> ' + message + '<br>';
    }

    window.onerror = function(msg, url, line) {
      showRuntimeError(`${msg} (line ${line})`);
      return false;
    };

    function buildTargetUrl() {
      const path = window.location.pathname;
      const segments = path.split('/').filter(s => s !== "");
      if (segments.length > 0 && !path.endsWith('.html')) {
        return `/${segments[0]}/targets.mind`;
      }
      return 'targets.mind';
    }

    const targetUrl = buildTargetUrl();
    sceneEl.setAttribute('mindar-image', `imageTargetSrc: ${targetUrl}; filterMinCF:0.001; filterBeta: 10`);

    sceneEl.addEventListener("arReady", () => {
      loadingScreen.style.opacity = '0';
      setTimeout(() => {
        loadingScreen.style.display = 'none';
      }, 400);
    });

    sceneEl.addEventListener("arError", () => {
      showRuntimeError(`DB_MISSING: ${window.location.origin}${targetUrl}`);
    });

    targetEntity.addEventListener("targetFound", () => {
      gameContainer.classList.add('active');
      scanGuide.style.display = 'none';
      setTimeout(initCanvas, 400);
    });

    // ==========================================================
    //       MODERN ANTI-ALIASED SMOOTH GAME ENGINE
    // ==========================================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startOverlay = document.getElementById('start-overlay');
    const gameoverOverlay = document.getElementById('gameover-overlay');
    const scoreText = document.getElementById('score-text');
    const finalScoreText = document.getElementById('final-score-text');
    const gameOverReason = document.getElementById('game-over-reason');

    const gridSize = 16; 
    let tileCountX = 0;
    let tileCountY = 0;
    let gridCellWidth = 0;
    let gridCellHeight = 0;

    let pipeline = [];
    let dx = 1; 
    let dy = 0; 
    let inputQueue = [];

    let oilDrop = { x: 0, y: 0, special: false };
    let score = 0;
    let gameActive = false;
    let lastTickTime = 0;
    
    let baseSpeed = 130; 
    let currentSpeed = baseSpeed;

    function initCanvas() {
      const wrapper = canvas.parentElement;
      const rect = wrapper.getBoundingClientRect();
      const margin = 20;
      const size = Math.floor(Math.min(rect.width - margin, rect.height - margin));
      
      canvas.width = size;
      canvas.height = size;

      tileCountX = gridSize;
      tileCountY = gridSize;
      gridCellWidth = size / tileCountX;
      gridCellHeight = size / tileCountY;

      if (gameActive) {
        drawGame();
      }
    }

    window.addEventListener('resize', () => {
      if (gameContainer.classList.contains('active')) {
        requestAnimationFrame(initCanvas);
      }
    });

    function setDirection(newDx, newDy) {
      if (!gameActive) return;
      
      const lastMove = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : { dx: dx, dy: dy };

      if ((newDx === -1 && lastMove.dx === 1) || (newDx === 1 && lastMove.dx === -1)) return;
      if ((newDy === -1 && lastMove.dy === 1) || (newDy === 1 && lastMove.dy === -1)) return;

      if (inputQueue.length < 2) {
        inputQueue.push({ dx: newDx, dy: newDy });
      }
    }

    // ==========================================================
    //      HIGH-SPEED RADIAL TOUCH ENGINE
    // ==========================================================
    const joystickBoundary = document.getElementById('joystick-boundary');
    const joystickStick = document.getElementById('joystick-stick');
    
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let currentPointerX = 0;
    let currentPointerY = 0;
    const maxDistance = 40; 
    const deadzone = 8; 

    function handleStart(clientX, clientY) {
      isDragging = true;
      const rect = joystickBoundary.getBoundingClientRect();
      dragStartX = rect.left + rect.width / 2;
      dragStartY = rect.top + rect.height / 2;
      currentPointerX = clientX;
      currentPointerY = clientY;
      
      joystickStick.style.transition = 'none';
      processJoystickPhysics(); 
    }

    function processJoystickPhysics() {
      if (!isDragging) return;

      const deltaX = currentPointerX - dragStartX;
      const deltaY = currentPointerY - dragStartY;
      const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
      
      let targetX = 0;
      let targetY = 0;

      if (distance > deadzone) {
        const angle = Math.atan2(deltaY, deltaX);
        const limitedDist = Math.min(distance, maxDistance);
        targetX = Math.cos(angle) * limitedDist;
        targetY = Math.sin(angle) * limitedDist;

        if (Math.abs(deltaX) > Math.abs(deltaY)) {
           setDirection(deltaX > 0 ? 1 : -1, 0);
        } else {
           setDirection(deltaY > 0 ? 1 : -1, 0);
        }
      }

      joystickStick.style.transform = `translate3d(${targetX}px, ${targetY}px, 0)`;
      requestAnimationFrame(processJoystickPhysics);
    }

    joystickBoundary.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleStart(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    window.addEventListener('touchmove', (e) => {
      if (isDragging) {
        currentPointerX = e.touches[0].clientX;
        currentPointerY = e.touches[0].clientY;
      }
    }, { passive: true });

    window.addEventListener('touchend', () => {
      if (!isDragging) return;
      isDragging = false;
      joystickStick.style.transition = 'transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
      joystickStick.style.transform = 'translate3d(0px, 0px, 0)';
    }, { passive: true });

    joystickBoundary.addEventListener('mousedown', (e) => {
      handleStart(e.clientX, e.clientY);
    });

    window.addEventListener('mousemove', (e) => {
      if (isDragging) {
        currentPointerX = e.clientX;
        currentPointerY = e.clientY;
      }
    });

    window.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      joystickStick.style.transition = 'transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
      joystickStick.style.transform = 'translate3d(0px, 0px, 0)';
    });

    window.addEventListener('keydown', (e) => {
      switch(e.key) {
        case 'ArrowUp': case 'w': case 'W': setDirection(0, -1); break;
        case 'ArrowDown': case 's': case 'S': setDirection(0, 1); break;
        case 'ArrowLeft': case 'a': case 'A': setDirection(-1, 0); break;
        case 'ArrowRight': case 'd': case 'D': setDirection(1, 0); break;
      }
    });

    function spawnOilDrop() {
      let valid = false;
      let rx, ry;
      while(!valid) {
        rx = Math.floor(Math.random() * tileCountX);
        ry = Math.floor(Math.random() * tileCountY);
        valid = !pipeline.some(segment => segment.x === rx && segment.y === ry);
      }
      oilDrop.x = rx;
      oilDrop.y = ry;
      oilDrop.special = Math.random() < 0.22; 
    }

    function startGame() {
      startOverlay.style.display = 'none';
      gameoverOverlay.style.display = 'none';
      initCanvas();

      score = 0;
      dx = 1;
      dy = 0;
      inputQueue = [];
      currentSpeed = baseSpeed;

      pipeline = [
        { x: 5, y: 8 },
        { x: 4, y: 8 },
        { x: 3, y: 8 }
      ];

      spawnOilDrop();
      gameActive = true;
      scoreText.innerText = `DATA: 0`;
      
      lastTickTime = performance.now();
      requestAnimationFrame(gameMainLoop);
    }

    function gameMainLoop(currentTime) {
      if (!gameActive) return;

      requestAnimationFrame(gameMainLoop);

      const delta = currentTime - lastTickTime;
      if (delta >= currentSpeed) {
        lastTickTime = currentTime - (delta % currentSpeed);
        updateGame();
        drawGame();
      }
    }

    function updateGame() {
      if (inputQueue.length > 0) {
        const nextMove = inputQueue.shift();
        dx = nextMove.dx;
        dy = nextMove.dy;
      }

      let nextX = pipeline[0].x + dx;
      let nextY = pipeline[0].y + dy;

      if (nextX < 0) nextX = tileCountX - 1;
      else if (nextX >= tileCountX) nextX = 0;

      if (nextY < 0) nextY = tileCountY - 1;
      else if (nextY >= tileCountY) nextY = 0;

      const head = { x: nextX, y: nextY };

      if (pipeline.some(segment => segment.x === head.x && segment.y === head.y)) {
        triggerLeak("Stream intersected configuration threshold.");
        return;
      }

      pipeline.unshift(head);

      if (head.x === oilDrop.x && head.y === oilDrop.y) {
        if (oilDrop.special) {
          score += 25;
          currentSpeed = Math.max(50, currentSpeed - 12); 
        } else {
          score += 10;
          currentSpeed = Math.max(50, currentSpeed - 5);
        }
        scoreText.innerText = `DATA: ${score}`;
        spawnOilDrop();
      } else {
        pipeline.pop();
      }
    }

    function triggerLeak(reason) {
      gameActive = false;
      finalScoreText.innerText = `Total Data: ${score}`;
      gameOverReason.innerText = reason;
      gameoverOverlay.style.display = 'flex';
    }

    // Smooth Anti-Aliased Vector Rendering Logic
    function drawGame() {
      // Clear with clean, subtly vibrant background color
      ctx.fillStyle = '#090a0f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw Soft Grid lines
      ctx.strokeStyle = '#141622';
      ctx.lineWidth = 1;
      for (let i = 0; i <= tileCountX; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridCellWidth, 0);
        ctx.lineTo(i * gridCellWidth, canvas.height);
        ctx.stroke();
      }
      for (let j = 0; j <= tileCountY; j++) {
        ctx.beginPath();
        ctx.moveTo(0, j * gridCellHeight);
        ctx.lineTo(canvas.width, j * gridCellHeight);
        ctx.stroke();
      }

      // Draw Smooth Circular Target Nodes
      const cx = oilDrop.x * gridCellWidth + gridCellWidth / 2;
      const cy = oilDrop.y * gridCellHeight + gridCellHeight / 2;
      const r = (gridCellWidth / 2) - 2;

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, 2 * Math.PI);
      if (oilDrop.special) {
        ctx.fillStyle = '#00FFCC';
        ctx.shadowColor = '#00FFCC';
        ctx.shadowBlur = 10;
      } else {
        ctx.fillStyle = '#FF9100';
        ctx.shadowColor = '#FF9100';
        ctx.shadowBlur = 10;
      }
      ctx.fill();
      
      // Soft Inner Core Glow
      ctx.beginPath();
      ctx.arc(cx - r/3, cy - r/3, r/3, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.fill();
      ctx.restore();

      // Draw Smooth Interconnected Stream Segments
      pipeline.forEach((segment, index) => {
        const sx = segment.x * gridCellWidth + gridCellWidth / 2;
        const sy = segment.y * gridCellHeight + gridCellHeight / 2;
        const radius = (gridCellWidth / 2) - 1;

        ctx.beginPath();
        ctx.arc(sx, sy, radius, 0, 2 * Math.PI);

        if (index === 0) {
          // Stream Head
          ctx.fillStyle = '#D32F2F';
          ctx.fill();

          // Smooth Radial Eyes
          ctx.fillStyle = '#FFFFFF';
          const eRadius = 2.5;
          
          if (dx === 1) { 
            ctx.beginPath(); ctx.arc(sx + radius/2, sy - radius/3, eRadius, 0, 2 * Math.PI); ctx.fill();
            ctx.beginPath(); ctx.arc(sx + radius/2, sy + radius/3, eRadius, 0, 2 * Math.PI); ctx.fill();
          } else if (dx === -1) { 
            ctx.beginPath(); ctx.arc(sx - radius/2, sy - radius/3, eRadius, 0, 2 * Math.PI); ctx.fill();
            ctx.beginPath(); ctx.arc(sx - radius/2, sy + radius/3, eRadius, 0, 2 * Math.PI); ctx.fill();
          } else if (dy === 1) { 
            ctx.beginPath(); ctx.arc(sx - radius/3, sy + radius/2, eRadius, 0, 2 * Math.PI); ctx.fill();
            ctx.beginPath(); ctx.arc(sx + radius/3, sy + radius/2, eRadius, 0, 2 * Math.PI); ctx.fill();
          } else { 
            ctx.beginPath(); ctx.arc(sx - radius/3, sy - radius/2, eRadius, 0, 2 * Math.PI); ctx.fill();
            ctx.beginPath(); ctx.arc(sx + radius/3, sy - radius/2, eRadius, 0, 2 * Math.PI); ctx.fill();
          }
        } else {
          // Stream Body
          ctx.fillStyle = '#FF6D00';
          ctx.fill();
        }
      });
    }
  </script>
