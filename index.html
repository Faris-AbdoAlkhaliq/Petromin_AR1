<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Petromin AR - Neo Cyber Edition</title>
  
  <!-- Stable A-Frame & MindAR CDN pairing -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <!-- Sleek Cyberpunk/Sci-Fi Geometric Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    /* Prevent rubber-banding or text selection highlighting on fast taps */
    * {
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Orbitron', sans-serif;
      background-color: #000;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    /* Refined Loading Screen */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #110000 0%, #050508 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: white;
      transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      padding: 20px;
      text-align: center;
    }

    /* Modern Circular Ring Spinner with Cyber Glow */
    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(213, 47, 47, 0.15);
      border-radius: 50%;
      border-top-color: #FF6D00;
      animation: spin 0.8s linear infinite;
      margin-bottom: 25px;
      box-shadow: 0 0 15px rgba(255, 109, 0, 0.4);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .pulse-text {
      font-size: 11px;
      letter-spacing: 2px;
      color: #FFCDD2;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* Diagnostics On-Screen Console */
    #error-console {
      display: none;
      background: rgba(5, 5, 8, 0.95);
      color: #00FFCC;
      padding: 15px;
      border: 1px solid #FF5252;
      border-radius: 8px;
      font-size: 10px;
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      z-index: 10000;
      word-break: break-all;
      box-shadow: 0 4px 20px rgba(255, 82, 82, 0.15);
    }

    /* Clean Scanner Target Bounds HUD */
    #scan-guide {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 260px;
      height: 260px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      pointer-events: none;
      z-index: 10;
    }

    #scan-guide span {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Precision sleek framing corners */
    #scan-guide::before, #scan-guide::after,
    #scan-guide span::before, #scan-guide span::after {
      content: "";
      position: absolute;
      width: 30px;
      height: 30px;
      border-color: #00FFCC;
      border-style: solid;
    }
    #scan-guide::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-top-left-radius: 12px; }
    #scan-guide::after { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-top-right-radius: 12px; }
    #scan-guide span::before { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; border-bottom-left-radius: 12px; }
    #scan-guide span::after { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-bottom-right-radius: 12px; }

    #scan-text {
      position: absolute;
      width: 100%;
      text-align: center;
      color: #FFFFFF;
      bottom: -55px;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    /* Game Container Overlay */
    #game-container {
      position: fixed;
      bottom: -100%;
      left: 0;
      width: 100%;
      height: 85vh;
      background: #06060a;
      border-top: 2px solid rgba(255, 109, 0, 0.4);
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      z-index: 100;
      transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-bottom: env(safe-area-inset-bottom);
    }

    #game-container.active {
      bottom: 0;
    }

    /* Header Panel */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: #0b0b12;
      border-bottom: 1px solid #161622;
      color: #fff;
    }

    .game-header h2 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 1.5px;
      color: #FF6D00;
      text-shadow: 0 0 10px rgba(255, 109, 0, 0.3);
    }

    .hud-metrics {
      display: flex;
      align-items: center;
    }

    .metric-box {
      background: #020204;
      padding: 6px 12px;
      border: 1px solid #00FFCC;
      border-radius: 6px;
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.15);
    }

    #score-text {
      color: #00FFCC;
      font-size: 11px;
      letter-spacing: 1px;
    }

    /* Canvas Area */
    .canvas-wrapper {
      position: relative;
      flex-grow: 1;
      width: 100%;
      background: #020204;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-bottom: 1px solid #161622;
    }

    #gameCanvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }

    /* Refined D-Pad Controls (Sleek Rounded Squares) */
    #controls-container {
      width: 100%;
      height: 180px;
      background: #0b0b12;
      background-image: linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
      background-size: 24px 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      flex-shrink: 0;
    }

    /* Rounded Square D-Pad Base */
    #joystick-boundary {
      width: 130px;
      height: 130px;
      background: #07070c;
      border: 1px solid #222232;
      border-radius: 24px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.8), 0 4px 20px rgba(0,0,0,0.4);
      touch-action: none;
    }

    /* Cross hair indicators */
    #joystick-boundary::before, #joystick-boundary::after {
      content: '';
      position: absolute;
      background: #181826;
      pointer-events: none;
    }
    #joystick-boundary::before { width: 70%; height: 1px; }
    #joystick-boundary::after { width: 1px; height: 70%; }

    /* Modern Control Stick Capsule */
    #joystick-stick {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, #FF9100 0%, #FF6D00 100%);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      position: absolute;
      touch-action: none;
      box-shadow: 0 4px 15px rgba(255, 109, 0, 0.4);
      will-change: transform;
      z-index: 2;
    }

    #joystick-stick:active {
      background: linear-gradient(135deg, #00FFCC 0%, #00b38f 100%);
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
    }

    /* Overlay Interfaces */
    .game-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(3, 3, 5, 0.96);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      z-index: 105;
      text-align: center;
      padding: 24px;
    }

    .game-overlay h3 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 2px;
      color: #FF6D00;
      text-shadow: 0 0 12px rgba(255, 109, 0, 0.3);
    }

    .game-overlay p {
      font-size: 11px;
      line-height: 1.8;
      color: #8a8a9e;
      letter-spacing: 0.5px;
    }

    /* Premium Glow Button */
    .game-overlay button {
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(90deg, #D32F2F, #FF6D00);
      color: white;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 14px 32px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      margin-top: 25px;
      box-shadow: 0 4px 20px rgba(211, 47, 47, 0.4);
      transition: all 0.15s ease;
    }

    .game-overlay button:active {
      transform: scale(0.97);
      box-shadow: 0 2px 10px rgba(211, 47, 47, 0.2);
    }

    /* Modern Info Box */
    .legend-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 20px 0;
      background: #0b0b12;
      padding: 16px;
      border: 1px solid #1c1c2e;
      border-radius: 12px;
      font-size: 10px;
      text-align: left;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #a0a0b5;
    }

    /* Smooth rounded tags */
    .legend-color {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <!-- Loading Animation Overlay -->
  <div id="loading">
    <div class="spinner"></div>
    <h3 style="margin:0; font-size:16px; letter-spacing: 3px;">PETROMIN AR</h3>
    <p class="pulse-text" style="margin-top:15px;">INITIALIZING APP SYSTEM...</p>
  </div>

  <!-- On-Screen Console for Diagnostics -->
  <div id="error-console"></div>

  <!-- HUD Overlay -->
  <div id="scan-guide">
    <span></span>
    <div id="scan-text">ALIGN WITH PETROMIN LOGO</div>
  </div>

  <!-- Interactive Game Drawer -->
  <div id="game-container">
    <div class="game-header">
      <h2>PETRO-BYPASS</h2>
      <div class="hud-metrics">
        <div class="metric-box" id="score-text">FLOW: 0 L</div>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>
      
      <!-- Interactive Neo D-Pad -->
      <div id="controls-container">
        <div id="joystick-boundary">
          <div id="joystick-stick"></div>
        </div>
      </div>

      <!-- Start Overlay -->
      <div id="start-overlay" class="game-overlay">
        <h3>SYSTEM FLOW</h3>
        <p style="margin-top: 12px;">Use the D-PAD frame to guide the stream.<br>Pass cleanly through walls to loop back.</p>
        
        <div class="legend-box">
          <div class="legend-item">
            <span class="legend-color" style="background:#FF9100; box-shadow: 0 0 8px #FF9100;"></span>
            <span>Standard Drop (+10 L)</span>
          </div>
          <div class="legend-item">
            <span class="legend-color" style="background:#00FFCC; box-shadow: 0 0 8px #00FFCC;"></span>
            <span>Premium Overclock (Speed Boost)</span>
          </div>
        </div>

        <button onclick="startGame()">START INJECTION</button>
      </div>

      <!-- Game Over Overlay -->
      <div id="gameover-overlay" class="game-overlay" style="display: none;">
        <h3 style="color: #D32F2F;">PRESSURE CORRUPTED</h3>
        <p id="final-score-text" style="font-size: 14px; margin: 15px 0; color: #00FFCC;">Total Volume: 0 L</p>
        <p id="game-over-reason" style="font-size: 10px; color: #6e6e82; max-width: 260px; margin-bottom: 15px;"></p>
        <button onclick="startGame()">RESET ENGINE</button>
      </div>
    </div>
  </div>

  <!-- AR Scene -->
  <a-scene 
    id="ar-scene"
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity id="ar-target" mindar-image-target="targetIndex: 0"></a-entity>
  </scene>

  <script>
    const loadingScreen = document.getElementById('loading');
    const scanGuide = document.getElementById('scan-guide');
    const gameContainer = document.getElementById('game-container');
    const targetEntity = document.getElementById('ar-target');
    const sceneEl = document.getElementById('ar-scene');
    const errConsole = document.getElementById('error-console');

    function showRuntimeError(message) {
      errConsole.style.display = 'block';
      errConsole.innerHTML += '<strong>[System Exception]:</strong> ' + message + '<br>';
    }

    window.onerror = function(msg, url, line) {
      showRuntimeError(`${msg} (line ${line})`);
      return false;
    };

    function buildTargetUrl() {
      const path = window.location.pathname;
      const segments = path.split('/').filter(s => s !== "");
      if (segments.length > 0 && !path.endsWith('.html')) {
        return `/${segments[0]}/targets.mind`;
      }
      return 'targets.mind';
    }

    const targetUrl = buildTargetUrl();
    sceneEl.setAttribute('mindar-image', `imageTargetSrc: ${targetUrl}; filterMinCF:0.001; filterBeta: 10`);

    sceneEl.addEventListener("arReady", () => {
      loadingScreen.style.opacity = '0';
      setTimeout(() => {
        loadingScreen.style.display = 'none';
      }, 400);
    });

    sceneEl.addEventListener("arError", () => {
      showRuntimeError(`Failed to trace target file context map at path: ${targetUrl}`);
    });

    targetEntity.addEventListener("targetFound", () => {
      gameContainer.classList.add('active');
      scanGuide.style.display = 'none';
      setTimeout(initCanvas, 400);
    });

    // ==========================================================
    //       MODERN SMOOTH HYBRID GAME ENGINE 
    // ==========================================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startOverlay = document.getElementById('start-overlay');
    const gameoverOverlay = document.getElementById('gameover-overlay');
    const scoreText = document.getElementById('score-text');
    const finalScoreText = document.getElementById('final-score-text');
    const gameOverReason = document.getElementById('game-over-reason');

    const gridSize = 18; 
    let tileCountX = 0;
    let tileCountY = 0;
    let gridCellWidth = 0;
    let gridCellHeight = 0;

    let pipeline = [];
    let dx = 1; 
    let dy = 0; 
    let inputQueue = [];

    let oilDrop = { x: 0, y: 0, special: false };
    let score = 0;
    let gameActive = false;
    let lastTickTime = 0;
    
    let baseSpeed = 130; 
    let currentSpeed = baseSpeed;

    function initCanvas() {
      const wrapper = canvas.parentElement;
      const rect = wrapper.getBoundingClientRect();
      const margin = 20;
      const size = Math.floor(Math.min(rect.width - margin, rect.height - margin));
      
      canvas.width = size;
      canvas.height = size;

      tileCountX = gridSize;
      tileCountY = gridSize;
      gridCellWidth = size / tileCountX;
      gridCellHeight = size / tileCountY;

      if (gameActive) {
        drawGame();
      }
    }

    window.addEventListener('resize', () => {
      if (gameContainer.classList.contains('active')) {
        requestAnimationFrame(initCanvas);
      }
    });

    function setDirection(newDx, newDy) {
      if (!gameActive) return;
      
      const lastMove = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : { dx: dx, dy: dy };

      if ((newDx === -1 && lastMove.dx === 1) || (newDx === 1 && lastMove.dx === -1)) return;
      if ((newDy === -1 && lastMove.dy === 1) || (newDy === 1 && lastMove.dy === -1)) return;

      if (inputQueue.length < 2) {
        inputQueue.push({ dx: newDx, dy: newDy });
      }
    }

    // ==========================================================
    //      HIGH-SPEED MODERN SNAPPING CONTROL LOOP
    // ==========================================================
    const joystickBoundary = document.getElementById('joystick-boundary');
    const joystickStick = document.getElementById('joystick-stick');
    
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let currentPointerX = 0;
    let currentPointerY = 0;
    const maxDistance = 42; 
    const deadzone = 8; 

    function handleStart(clientX, clientY) {
      isDragging = true;
      const rect = joystickBoundary.getBoundingClientRect();
      dragStartX = rect.left + rect.width / 2;
      dragStartY = rect.top + rect.height / 2;
      currentPointerX = clientX;
      currentPointerY = clientY;
      
      joystickStick.style.transition = 'none';
      processJoystickPhysics(); 
    }

    function processJoystickPhysics() {
      if (!isDragging) return;

      const deltaX = currentPointerX - dragStartX;
      const deltaY = currentPointerY - dragStartY;
      
      let targetX = 0;
      let targetY = 0;

      if (Math.abs(deltaX) > deadzone || Math.abs(deltaY) > deadzone) {
        if (Math.abs(deltaX) > Math.abs(deltaY)) {
           targetX = deltaX > 0 ? maxDistance : -maxDistance;
           setDirection(targetX > 0 ? 1 : -1, 0);
        } else {
           targetY = deltaY > 0 ? maxDistance : -maxDistance;
           setDirection(0, targetY > 0 ? 1 : -1);
        }
      }

      // Smooth hardware accelerated visual shift
      joystickStick.style.transform = `translate3d(${targetX}px, ${targetY}px, 0)`;
      requestAnimationFrame(processJoystickPhysics);
    }

    joystickBoundary.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleStart(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    window.addEventListener('touchmove', (e) => {
      if (isDragging) {
        currentPointerX = e.touches[0].clientX;
        currentPointerY = e.touches[0].clientY;
      }
    }, { passive: true });

    window.addEventListener('touchend', () => {
      if (!isDragging) return;
      isDragging = false;
      joystickStick.style.transition = 'transform 0.15s cubic-bezier(0.25, 1, 0.5, 1)'; 
      joystickStick.style.transform = 'translate3d(0px, 0px, 0)';
    }, { passive: true });

    // Desktop Mouse Handlers
    joystickBoundary.addEventListener('mousedown', (e) => {
      handleStart(e.clientX, e.clientY);
    });

    window.addEventListener('mousemove', (e) => {
      if (isDragging) {
        currentPointerX = e.clientX;
        currentPointerY = e.clientY;
      }
    });

    window.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      joystickStick.style.transition = 'transform 0.15s cubic-bezier(0.25, 1, 0.5, 1)';
      joystickStick.style.transform = 'translate3d(0px, 0px, 0)';
    });

    window.addEventListener('keydown', (e) => {
      switch(e.key) {
        case 'ArrowUp': case 'w': case 'W': setDirection(0, -1); break;
        case 'ArrowDown': case 's': case 'S': setDirection(0, 1); break;
        case 'ArrowLeft': case 'a': case 'A': setDirection(-1, 0); break;
        case 'ArrowRight': case 'd': case 'D': setDirection(1, 0); break;
      }
    });

    function spawnOilDrop() {
      let valid = false;
      let rx, ry;
      while(!valid) {
        rx = Math.floor(Math.random() * tileCountX);
        ry = Math.floor(Math.random() * tileCountY);
        valid = !pipeline.some(segment => segment.x === rx && segment.y === ry);
      }
      oilDrop.x = rx;
      oilDrop.y = ry;
      oilDrop.special = Math.random() < 0.22; 
    }

    function startGame() {
      startOverlay.style.display = 'none';
      gameoverOverlay.style.display = 'none';
      initCanvas();

      score = 0;
      dx = 1;
      dy = 0;
      inputQueue = [];
      currentSpeed = baseSpeed;

      pipeline = [
        { x: 5, y: 9 },
        { x: 4, y: 9 },
        { x: 3, y: 9 }
      ];

      spawnOilDrop();
      gameActive = true;
      scoreText.innerText = `FLOW: 0 L`;
      
      lastTickTime = performance.now();
      requestAnimationFrame(gameMainLoop);
    }

    function gameMainLoop(currentTime) {
      if (!gameActive) return;

      requestAnimationFrame(gameMainLoop);

      const delta = currentTime - lastTickTime;
      if (delta >= currentSpeed) {
        lastTickTime = currentTime - (delta % currentSpeed);
        updateGame();
        drawGame();
      }
    }

    function updateGame() {
      if (inputQueue.length > 0) {
        const nextMove = inputQueue.shift();
        dx = nextMove.dx;
        dy = nextMove.dy;
      }

      let nextX = pipeline[0].x + dx;
      let nextY = pipeline[0].y + dy;

      if (nextX < 0) nextX = tileCountX - 1;
      else if (nextX >= tileCountX) nextX = 0;

      if (nextY < 0) nextY = tileCountY - 1;
      else if (nextY >= tileCountY) nextY = 0;

      const head = { x: nextX, y: nextY };

      if (pipeline.some(segment => segment.x === head.x && segment.y === head.y)) {
        triggerLeak("Loop overlap: pressure system compromised.");
        return;
      }

      pipeline.unshift(head);

      if (head.x === oilDrop.x && head.y === oilDrop.y) {
        if (oilDrop.special) {
          score += 25;
          currentSpeed = Math.max(50, currentSpeed - 12); 
        } else {
          score += 10;
          currentSpeed = Math.max(50, currentSpeed - 5);
        }
        scoreText.innerText = `FLOW: ${score} L`;
        spawnOilDrop();
      } else {
        pipeline.pop();
      }
    }

    function triggerLeak(reason) {
      gameActive = false;
      finalScoreText.innerText = `Total Volume: ${score} L`;
      gameOverReason.innerText = reason;
      gameoverOverlay.style.display = 'flex';
    }

    // Refined modern layout rendering method
    function drawGame() {
      ctx.fillStyle = '#020204';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Soft tech grid line traces
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.015)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= tileCountX; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridCellWidth, 0);
        ctx.lineTo(i * gridCellWidth, canvas.height);
        ctx.stroke();
      }
      for (let j = 0; j <= tileCountY; j++) {
        ctx.beginPath();
        ctx.moveTo(0, j * gridCellHeight);
        ctx.lineTo(canvas.width, j * gridCellHeight);
        ctx.stroke();
      }

      // Draw Smooth Rounded Nodes (Targets)
      ctx.save();
      const fx = oilDrop.x * gridCellWidth;
      const fy = oilDrop.y * gridCellHeight;
      const fOffset = 3; 
      const rw = gridCellWidth - fOffset * 2;
      const rh = gridCellHeight - fOffset * 2;

      ctx.shadowBlur = 10;
      if (oilDrop.special) {
        ctx.fillStyle = '#00FFCC';
        ctx.shadowColor = '#00FFCC';
      } else {
        ctx.fillStyle = '#FF9100';
        ctx.shadowColor = '#FF9100';
      }

      ctx.beginPath();
      ctx.roundRect(fx + fOffset, fy + fOffset, rw, rh, 5); // Smooth corner radius
      ctx.fill();
      ctx.restore();

      // Draw Clean Rounded Pipeline Stream
      pipeline.forEach((segment, index) => {
        ctx.save();
        const sx = segment.x * gridCellWidth;
        const sy = segment.y * gridCellHeight;
        const sOffset = 1.5;
        const sw = gridCellWidth - sOffset * 2;
        const sh = gridCellHeight - sOffset * 2;

        if (index === 0) {
          // Head block configuration
          ctx.fillStyle = '#D32F2F';
          ctx.shadowBlur = 12;
          ctx.shadowColor = '#D32F2F';
          ctx.beginPath();
          ctx.roundRect(sx + sOffset, sy + sOffset, sw, sh, 6);
          ctx.fill();

          // Smooth targeted optical eyes
          ctx.fillStyle = '#FFFFFF';
          const eyeRad = 2;
          ctx.beginPath();
          if (dx === 1) { 
            ctx.arc(sx + gridCellWidth - 6, sy + 6, eyeRad, 0, Math.PI*2);
            ctx.arc(sx + gridCellWidth - 6, sy + gridCellHeight - 6, eyeRad, 0, Math.PI*2);
          } else if (dx === -1) { 
            ctx.arc(sx + 6, sy + 6, eyeRad, 0, Math.PI*2);
            ctx.arc(sx + 6, sy + gridCellHeight - 6, eyeRad, 0, Math.PI*2);
          } else if (dy === 1) { 
            ctx.arc(sx + 6, sy + gridCellHeight - 6, eyeRad, 0, Math.PI*2);
            ctx.arc(sx + gridCellWidth - 6, sy + gridCellHeight - 6, eyeRad, 0, Math.PI*2);
          } else { 
            ctx.arc(sx + 6, sy + 6, eyeRad, 0, Math.PI*2);
            ctx.arc(sx + gridCellWidth - 6, sy + 6, eyeRad, 0, Math.PI*2);
          }
          ctx.fill();
        } else {
          // Body traces
          ctx.fillStyle = '#FF6D00';
          ctx.beginPath();
          ctx.roundRect(sx + sOffset, sy + sOffset, sw, sh, 4);
          ctx.fill();
        }
        ctx.restore();
      });
    }
  </script>
</body>
