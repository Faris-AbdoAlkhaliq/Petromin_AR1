<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Petromin AR Game</title>
  
  <!-- Stable A-Frame & MindAR CDN pairing -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #000;
      -webkit-tap-highlight-color: transparent;
    }

    /* Loading Screen using Petromin's corporate color palette */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #D32F2F 0%, #FF6D00 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: white;
      transition: opacity 0.5s ease;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }

    .spinner {
      width: 55px;
      height: 55px;
      border: 5px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      border-top-color: #FFFFFF;
      animation: spin 1s linear infinite;
      margin-bottom: 25px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Diagnostics On-Screen Console */
    #error-console {
      display: none;
      background: rgba(0, 0, 0, 0.9);
      color: #FF8A80;
      padding: 15px;
      border-radius: 12px;
      font-family: monospace;
      font-size: 11px;
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      z-index: 10000;
      word-break: break-all;
      border: 1px solid #FF5252;
    }

    /* Scanner Target Bounds HUD */
    #scan-guide {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 260px;
      height: 260px;
      border: 2px dashed rgba(255, 255, 255, 0.35);
      border-radius: 24px;
      pointer-events: none;
      z-index: 10;
    }

    #scan-guide::before, #scan-guide::after,
    #scan-guide span::before, #scan-guide span::after {
      content: "";
      position: absolute;
      width: 35px;
      height: 35px;
      border-color: #FFFFFF;
      border-style: solid;
    }
    /* Corner HUD Borders */
    #scan-guide::before { top: -3px; left: -3px; border-width: 5px 0 0 5px; border-top-left-radius: 18px; }
    #scan-guide::after { top: -3px; right: -3px; border-width: 5px 5px 0 0; border-top-right-radius: 18px; }
    #scan-guide span::before { bottom: -3px; left: -3px; border-width: 0 0 5px 5px; border-bottom-left-radius: 18px; }
    #scan-guide span::after { bottom: -3px; right: -3px; border-width: 0 5px 5px 0; border-bottom-right-radius: 18px; }

    #scan-text {
      position: absolute;
      width: 100%;
      text-align: center;
      color: #FFFFFF;
      bottom: -50px;
      font-size: 13px;
      font-weight: bold;
      text-shadow: 0 2px 5px rgba(0,0,0,0.9);
      letter-spacing: 1px;
    }

    /* Brand Slide-up Modal Drawer (NOW CONTAINER FOR THE GAME) */
    #game-container {
      position: fixed;
      bottom: -100%;
      left: 0;
      width: 100%;
      height: 75vh;
      background: #111116;
      border-top-left-radius: 28px;
      border-top-right-radius: 28px;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
      z-index: 100;
      transition: bottom 0.5s cubic-bezier(0.1, 0.76, 0.55, 0.94);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #game-container.active {
      bottom: 0;
    }

    .card-handle {
      width: 36px;
      height: 5px;
      background: #444;
      border-radius: 10px;
      margin: 12px auto 8px;
      flex-shrink: 0;
    }

    /* Header for the Arcade Panel */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px 10px;
      color: #fff;
    }

    .game-header h2 {
      margin: 0;
      font-size: 18px;
      background: linear-gradient(90deg, #FF6D00, #D32F2F);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .game-score-board {
      font-family: monospace;
      font-size: 16px;
      color: #00FFCC;
      text-shadow: 0 0 5px rgba(0, 255, 210, 0.5);
    }

    /* The actual 2D Canvas container */
    .canvas-wrapper {
      position: relative;
      flex-grow: 1;
      width: 100%;
      background: #0d0d11;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Mobile virtual control overlays and overlays for game states */
    .game-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      z-index: 105;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .game-overlay button {
      background: linear-gradient(90deg, #D32F2F, #FF6D00);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 25px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
      box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);
    }

    .scanner-exit-btn {
      background: transparent !important;
      border: 1.5px solid #FF6D00 !important;
      color: #FF6D00 !important;
      box-shadow: none !important;
      margin-top: 10px !important;
    }
  </style>
</head>
<body>

  <!-- Loading Animation Overlay -->
  <div id="loading">
    <div class="spinner"></div>
    <h3 style="margin:0; letter-spacing: 1px;">PETROMIN AR</h3>
    <p style="font-size:12px; opacity:0.8; margin-top:5px; font-weight: 500;">Accessing Camera Feed...</p>
  </div>

  <!-- On-Screen Console for Diagnostics -->
  <div id="error-console"></div>

  <!-- HUD Overlay -->
  <div id="scan-guide">
    <span></span>
    <div id="scan-text">ALIGN WITH PETROMIN LOGO</div>
  </div>

  <!-- Interactive 2D Game Drawer -->
  <div id="game-container">
    <div class="card-handle"></div>
    <div class="game-header">
      <h2>PETROMIN RUN</h2>
      <div class="game-score-board" id="score-text">SCORE: 00</div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>
      
      <!-- Start/Game Over Overlay screens within the console -->
      <div id="start-overlay" class="game-overlay">
        <h3 style="margin: 0; font-size: 24px; color: #FF6D00;">PETROLUBE CHASE</h3>
        <p style="font-size: 13px; color: #ccc; margin-top: 8px;">Drag your Petromin truck left & right.<br>Collect Oil Drops but avoid Spanners!</p>
        <button onclick="startGame()">TAP TO PLAY</button>
      </div>

      <div id="gameover-overlay" class="game-overlay" style="display: none;">
        <h3 style="margin: 0; font-size: 28px; color: #D32F2F;">GAME OVER</h3>
        <p id="final-score-text" style="font-size: 16px; margin: 10px 0;">Final Score: 0</p>
        <button onclick="startGame()">PLAY AGAIN</button>
        <button class="scanner-exit-btn" onclick="resetScanner()">SCAN ANOTHER LOGO</button>
      </div>
    </div>
  </div>

  <!-- AR Scene -->
  <a-scene 
    id="ar-scene"
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Index 0 corresponds to the compiled logo marker inside targets.mind -->
    <a-entity id="ar-target" mindar-image-target="targetIndex: 0"></a-entity>
  </scene>

  <script>
    const loadingScreen = document.getElementById('loading');
    const scanGuide = document.getElementById('scan-guide');
    const gameContainer = document.getElementById('game-container');
    const targetEntity = document.getElementById('ar-target');
    const sceneEl = document.getElementById('ar-scene');
    const errConsole = document.getElementById('error-console');

    // Display error stack if file compilation fails
    function showRuntimeError(message) {
      errConsole.style.display = 'block';
      errConsole.innerHTML += '<strong>[System Check]:</strong> ' + message + '<br>';
    }

    // Capture global page failures
    window.onerror = function(msg, url, line) {
      showRuntimeError(`${msg} (line ${line})`);
      return false;
    };

    // Auto-detect if host path is root or subfolder (GitHub Pages Repo setup)
    function buildTargetUrl() {
      const path = window.location.pathname;
      const segments = path.split('/').filter(s => s !== "");
      
      // If deployed in a GitHub sub-repository
      if (segments.length > 0 && !path.endsWith('.html')) {
        return `/${segments[0]}/targets.mind`;
      }
      return 'targets.mind';
    }

    const targetUrl = buildTargetUrl();
    sceneEl.setAttribute('mindar-image', `imageTargetSrc: ${targetUrl}; filterMinCF:0.001; filterBeta: 10`);

    // Complete loading stage once engine is online
    sceneEl.addEventListener("arReady", () => {
      loadingScreen.style.opacity = '0';
      setTimeout(() => {
        loadingScreen.style.display = 'none';
      }, 500);
    });

    // Detect missing file or assets
    sceneEl.addEventListener("arError", () => {
      showRuntimeError(`Engine could not download target descriptor database at: ${window.location.origin}${targetUrl}`);
    });

    // Image target detection triggers information panel
    targetEntity.addEventListener("targetFound", () => {
      gameContainer.classList.add('active');
      scanGuide.style.display = 'none';
      // Auto-resize game canvas when revealed
      initCanvas();
    });

    // Reset scanner viewport
    function resetScanner() {
      stopGame();
      gameContainer.classList.remove('active');
      setTimeout(() => {
        scanGuide.style.display = 'block';
      }, 300);
    }

    // ==========================================
    //            2D CANVAS ARCADE GAME
    // ==========================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startOverlay = document.getElementById('start-overlay');
    const gameoverOverlay = document.getElementById('gameover-overlay');
    const scoreText = document.getElementById('score-text');
    const finalScoreText = document.getElementById('final-score-text');

    let gameActive = false;
    let score = 0;
    let lives = 3;
    let animationId = null;

    // Player (Truck) state
    const player = {
      x: 0,
      y: 0,
      width: 55,
      height: 35,
      speed: 15
    };

    let items = [];
    let spawnRate = 40; // frames between spawns
    let frameCount = 0;

    function initCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
      player.x = canvas.width / 2 - player.width / 2;
      player.y = canvas.height - player.height - 15;
    }

    // Touch and Drag controls
    let isDragging = false;
    canvas.addEventListener('mousedown', (e) => { isDragging = true; movePlayer(e); });
    canvas.addEventListener('mousemove', (e) => { if (isDragging) movePlayer(e); });
    window.addEventListener('mouseup', () => { isDragging = false; });

    canvas.addEventListener('touchstart', (e) => { isDragging = true; movePlayer(e.touches[0]); });
    canvas.addEventListener('touchmove', (e) => { if (isDragging) movePlayer(e.touches[0]); e.preventDefault(); }, { passive: false });
    window.addEventListener('touchend', () => { isDragging = false; });

    function movePlayer(input) {
      const rect = canvas.getBoundingClientRect();
      const relativeX = input.clientX - rect.left;
      player.x = Math.max(0, Math.min(canvas.width - player.width, relativeX - player.width / 2));
    }

    function startGame() {
      startOverlay.style.display = 'none';
      gameoverOverlay.style.display = 'none';
      initCanvas();
      
      score = 0;
      lives = 3;
      items = [];
      gameActive = true;
      scoreText.innerText = `SCORE: 00`;
      
      if(animationId) cancelAnimationFrame(animationId);
      gameLoop();
    }

    function stopGame() {
      gameActive = false;
      if(animationId) cancelAnimationFrame(animationId);
    }

    function gameOver() {
      gameActive = false;
      finalScoreText.innerText = `Final Score: ${score}`;
      gameoverOverlay.style.display = 'flex';
    }

    function spawnItem() {
      const types = ['oil', 'oil', 'obstacle']; // 66% chance of oil, 33% hazard
      const type = types[Math.floor(Math.random() * types.length)];
      
      items.push({
        x: Math.random() * (canvas.width - 24),
        y: -30,
        size: 24,
        type: type,
        speed: 3 + Math.random() * 4
      });
    }

    function gameLoop() {
      if (!gameActive) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Draw road decoration stripes
      ctx.fillStyle = '#1e1e24';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#333';
      for(let y = 0; y < canvas.height; y += 40) {
        ctx.fillRect(canvas.width / 2 - 4, y, 8, 20);
      }

      // Draw player truck (Styled like a Petromin Quick Lube van)
      // Truck bed
      ctx.fillStyle = '#D32F2F'; // Petromin corporate red
      ctx.fillRect(player.x, player.y + 10, player.width - 15, player.height - 10);
      // Truck cabin
      ctx.fillStyle = '#FF6D00'; // Petromin Orange
      ctx.fillRect(player.x + player.width - 15, player.y + 12, 15, player.height - 12);
      // Truck windshield
      ctx.fillStyle = '#E0F7FA';
      ctx.fillRect(player.x + player.width - 6, player.y + 14, 5, 8);
      // White Stripe accent
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(player.x + 5, player.y + 17, player.width - 20, 3);
      // Wheels
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(player.x + 12, player.y + player.height, 7, 0, Math.PI * 2);
      ctx.arc(player.x + player.width - 12, player.y + player.height, 7, 0, Math.PI * 2);
      ctx.fill();

      // Manage and Draw Items
      frameCount++;
      if (frameCount % spawnRate === 0) {
        spawnItem();
        // Speed up spawn rate gradually as points are gained
        if(spawnRate > 15 && score % 50 === 0) spawnRate--; 
      }

      for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        item.y += item.speed;

        // Collision Check
        if (
          item.x < player.x + player.width &&
          item.x + item.size > player.x &&
          item.y < player.y + player.height &&
          item.y + item.size > player.y
        ) {
          // Trigger impact logic
          if (item.type === 'oil') {
            score += 10;
            scoreText.innerText = `SCORE: ${score}`;
          } else {
            lives--;
            // Shake visual indicator
            gameContainer.style.animation = 'none';
            setTimeout(() => gameContainer.style.animation = 'shake 0.3s', 1);
            if (lives <= 0) {
              gameOver();
              return;
            }
          }
          items.splice(i, 1);
          continue;
        }

        // Off-screen check
        if (item.y > canvas.height) {
          items.splice(i, 1);
          continue;
        }

        // Draw Items
        if (item.type === 'oil') {
          // Draw bright Orange/Yellow droplet
          ctx.fillStyle = '#FF9100';
          ctx.beginPath();
          ctx.moveTo(item.x + item.size/2, item.y);
          ctx.quadraticCurveTo(item.x + item.size, item.y + item.size, item.x + item.size/2, item.y + item.size);
          ctx.quadraticCurveTo(item.x, item.y + item.size, item.x + item.size/2, item.y);
          ctx.fill();
        } else {
          // Draw metallic Spanner wrench obstacle
          ctx.fillStyle = '#B0BEC5';
          ctx.fillRect(item.x + item.size/2 - 3, item.y, 6, item.size);
          ctx.beginPath();
          ctx.arc(item.x + item.size/2, item.y + 3, 7, 0, Math.PI * 2);
          ctx.arc(item.x + item.size/2, item.y + item.size - 3, 7, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Draw active remaining Lives (little red stars/bars)
      for (let l = 0; l < 3; l++) {
        ctx.fillStyle = l < lives ? '#D32F2F' : '#333';
        ctx.fillRect(15 + l * 18, 15, 12, 12);
      }

      animationId = requestAnimationFrame(gameLoop);
    }
  </script>

  <!-- Shake Animation CSS Inject -->
  <style>
    @keyframes shake {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-8px, 0); }
      40% { transform: translate(6px, 0); }
      60% { transform: translate(-4px, 0); }
      80% { transform: translate(2px, 0); }
      100% { transform: translate(0, 0); }
    }
  </style>
</body>
</html>
